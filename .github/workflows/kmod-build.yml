name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      newest_lines_count:
        required: false
        type: number
        default: 1
      dry_run:
        required: false
        type: boolean
        default: false
      release_lines:
        required: false
        type: string
        default: ''
      kernel_versions:
        required: false
        type: string
        default: ''
      build_families:
        required: false
        type: string
        default: 'rpi'
      module_path:
        required: false
        type: string
        default: '.'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          set -e
          echo "Runner host architecture: $(dpkg --print-architecture)"
          sudo apt update
          # Base tools and native compiler
          sudo apt install -y build-essential jq curl xz-utils gnupg gcc-12 device-tree-compiler
          # Keep armhf cross toolchain available for targets inferred as 32-bit ARM.
          sudo apt install -y gcc-12-arm-linux-gnueabihf

      - name: Enable package architectures for apt
        run: |
          set -e
          # Enable both package architectures so target architecture can be inferred from package metadata.
          sudo dpkg --add-architecture arm64
          sudo dpkg --add-architecture armhf
          sudo apt-get update --allow-releaseinfo-change || true

      - name: Add Raspberry Pi OS repository and GPG key
        run: |
          set -e
          DISTRO_INFO_URL="https://salsa.debian.org/debian/distro-info-data/-/raw/main/debian.csv"
          TODAY="$(date -u +%F)"
          CODENAME="$(curl -fsSL "$DISTRO_INFO_URL" | awk -F',' -v today="$TODAY" 'NR > 1 && $5 != "" && $5 <= today { if ($5 > max) { max=$5; code=$2 } } END { print code }')"
          CODENAME_SOURCE="debian-distro-info"
          if [ -z "$CODENAME" ]; then
            CODENAME="trixie"
            CODENAME_SOURCE="fallback-trixie"
            echo "::warning::Failed to resolve Debian codename from distro-info; falling back to '$CODENAME'"
          fi

          echo "Resolved Raspberry Pi repository codename: $CODENAME (source: $CODENAME_SOURCE)"
          echo "deb http://archive.raspberrypi.org/debian/ $CODENAME main" | sudo tee /etc/apt/sources.list.d/raspi.list
          curl -fsSL https://archive.raspberrypi.org/debian/raspberrypi.gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/raspberrypi.gpg
          sudo apt-get update --allow-releaseinfo-change || true

      - name: Download kernel headers deb(s) with apt
        id: download_headers
        run: |
          set -e
          EXPLICIT_VERSIONS="${{ inputs.kernel_versions }}"
          EXPLICIT_LINES="${{ inputs.release_lines }}"
          NEWEST_LINES_COUNT="${{ inputs.newest_lines_count }}"
          DRY_RUN="${{ inputs.dry_run }}"
          BUILD_FAMILIES_RAW="${{ inputs.build_families }}"
          HOST_ARCH="$(dpkg --print-architecture)"

          BUILD_FAMILIES="$(echo "$BUILD_FAMILIES_RAW" | tr '[:upper:]' '[:lower:]' | tr ',' ' ')"
          INCLUDE_RPI=0
          INCLUDE_UBUNTU=0
          for family in $BUILD_FAMILIES; do
            family="$(echo "$family" | xargs)"
            [ -z "$family" ] && continue
            case "$family" in
              rpi)
                INCLUDE_RPI=1
                ;;
              ubuntu)
                INCLUDE_UBUNTU=1
                ;;
              *)
                echo "::warning::Ignoring invalid build_families token '$family'"
                ;;
            esac
          done
          if [ "$INCLUDE_RPI" -eq 0 ] && [ "$INCLUDE_UBUNTU" -eq 0 ]; then
            INCLUDE_RPI=1
            echo "::warning::No valid build_families token found; defaulting to rpi"
          fi

          echo "Host architecture: $HOST_ARCH"
          echo "Selection inputs: newest_lines_count=$NEWEST_LINES_COUNT dry_run=$DRY_RUN release_lines='${EXPLICIT_LINES:-}' kernel_versions='${EXPLICIT_VERSIONS:-}'"
          echo "Family selection: include_rpi=$INCLUDE_RPI include_ubuntu=$INCLUDE_UBUNTU"

          rm -f candidates.txt selected_targets.txt kernel_targets.txt

          # Collect candidate header packages from enabled families.
          apt list -a 'linux-headers-*' 2>/dev/null | awk -v include_rpi="$INCLUDE_RPI" -v include_ubuntu="$INCLUDE_UBUNTU" '
            /^linux-headers-[0-9]/ {
              split($1, path, "/")
              pkg=path[1]
              sub(/^linux-headers-/, "", pkg)
              arch=$3
              if (arch !~ /^(arm64|armhf)$/) next
              if (pkg !~ /^[0-9]+\.[0-9]+\.[0-9]+/) next

              family=""
              if (pkg ~ /\+rpt-/) {
                family="rpi"
              } else if (pkg ~ /-raspi$/) {
                family="ubuntu"
              } else {
                next
              }

              if (family == "rpi" && include_rpi != 1) next
              if (family == "ubuntu" && include_ubuntu != 1) next

              # For Ubuntu raspi kernels include ABI in core (e.g. 6.8.0-1053)
              # so "latest core in a line" does not collapse to every historical ABI.
              if (family == "ubuntu") {
                if (match(pkg, /^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+/)) {
                  core=substr(pkg, RSTART, RLENGTH)
                } else if (match(pkg, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                  core=substr(pkg, RSTART, RLENGTH)
                } else {
                  next
                }
              } else {
                if (match(pkg, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                  core=substr(pkg, RSTART, RLENGTH)
                } else {
                  next
                }
              }
              if (match(core, /^[0-9]+\.[0-9]+/)) {
                line=substr(core, RSTART, RLENGTH)
              } else {
                next
              }
              print pkg "|" arch "|linux-headers-" pkg "|" family "|" core "|" line
            }
          ' | sort -u > candidates.txt

          if [ ! -s candidates.txt ]; then
            REASON="no kernel headers were discovered in apt metadata"
            RPI_SELECTED_COUNT=0
            UBUNTU_SELECTED_COUNT=0
            RPI_BUILD_TARGET_COUNT=0
            UBUNTU_BUILD_TARGET_COUNT=0
            FAMILY_POLICY_FAILED=false
            FAMILY_POLICY_REASON=""
            if [ "$INCLUDE_RPI" -eq 1 ]; then
              FAMILY_POLICY_FAILED=true
              FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}rpi=0"
            fi
            if [ "$INCLUDE_UBUNTU" -eq 1 ]; then
              FAMILY_POLICY_FAILED=true
              FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}ubuntu=0"
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "selected_target_count=0" >> "$GITHUB_OUTPUT"
            echo "selected_rpi_count=$RPI_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "selected_ubuntu_count=$UBUNTU_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_rpi_count=$RPI_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_ubuntu_count=$UBUNTU_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "family_policy_failed=$FAMILY_POLICY_FAILED" >> "$GITHUB_OUTPUT"
            echo "family_policy_reason=$FAMILY_POLICY_REASON" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          add_selection_by_core() {
            local core="$1"
            if [ -n "$core" ]; then
              awk -F'|' -v c="$core" '$5 == c { print }' candidates.txt >> selected_targets.txt
            fi
          }

          : > selected_targets.txt

          if [ -n "$EXPLICIT_VERSIONS" ]; then
            echo "Selection mode: explicit versions"
            TOKENS=$(echo "$EXPLICIT_VERSIONS" | tr ',' ' ')
            for token in $TOKENS; do
              token="$(echo "$token" | xargs)"
              [ -z "$token" ] && continue
              if echo "$token" | grep -Eq '[+-]'; then
                # Full kernel flavor token such as 6.12.75+rpt-rpi-v8.
                awk -F'|' -v t="$token" '$1 == t { print }' candidates.txt >> selected_targets.txt
              elif echo "$token" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                # Explicit core version such as 6.12.75.
                add_selection_by_core "$token"
              else
                echo "::warning::Ignoring invalid kernel_versions token '$token'"
              fi
            done
          elif [ -n "$EXPLICIT_LINES" ]; then
            echo "Selection mode: explicit release lines"
            TOKENS=$(echo "$EXPLICIT_LINES" | tr ',' ' ')
            for line in $TOKENS; do
              line="$(echo "$line" | xargs)"
              [ -z "$line" ] && continue
              latest_core=$(awk -F'|' -v l="$line" '$6 == l { print $5 }' candidates.txt | sort -uV | tail -n 1 || true)
              if [ -z "$latest_core" ]; then
                echo "::warning::No kernel release matched line '$line'"
                continue
              fi
              add_selection_by_core "$latest_core"
            done
          else
            echo "Selection mode: newest release lines"
            LINES=$(awk -F'|' '{ print $6 }' candidates.txt | sort -uV)
            NEWEST_LINES=$(echo "$LINES" | tail -n "$NEWEST_LINES_COUNT")
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              latest_core=$(awk -F'|' -v l="$line" '$6 == l { print $5 }' candidates.txt | sort -uV | tail -n 1 || true)
              [ -z "$latest_core" ] && continue
              add_selection_by_core "$latest_core"
            done <<< "$NEWEST_LINES"
          fi

          sort -u selected_targets.txt -o selected_targets.txt

          if [ ! -s selected_targets.txt ]; then
            echo "::error::Kernel selection produced no targets"
            exit 1
          fi

          SELECTED_TARGET_COUNT="$(wc -l < selected_targets.txt | tr -d ' ')"
          [ -z "$SELECTED_TARGET_COUNT" ] && SELECTED_TARGET_COUNT=0

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run selected kernel targets (kver|arch|pkg|family|core|line):"
            cat selected_targets.txt
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=dry-run mode enabled" >> "$GITHUB_OUTPUT"
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "selected_target_count=$SELECTED_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Selected kernel targets (kver|arch|pkg|family|core|line):"
          cat selected_targets.txt

          RPI_SELECTED_COUNT="$(awk -F'|' '$4 == "rpi" { c++ } END { print c+0 }' selected_targets.txt)"
          UBUNTU_SELECTED_COUNT="$(awk -F'|' '$4 == "ubuntu" { c++ } END { print c+0 }' selected_targets.txt)"
          echo "Selected families: rpi=$RPI_SELECTED_COUNT ubuntu=$UBUNTU_SELECTED_COUNT"

          : > kernel_targets.txt

          while IFS='|' read -r KVER APT_ARCH HEADER_PKG FAMILY CORE LINE; do
            [ -z "$KVER" ] && continue

            if ! apt download "$HEADER_PKG:$APT_ARCH" >/dev/null 2>&1; then
              echo "::warning::Skipping kernel '$KVER': cannot download headers package '$HEADER_PKG:$APT_ARCH'"
              continue
            fi

            if [ "$FAMILY" = "rpi" ]; then
              BASE_RPT=$(echo "$KVER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\+rpt' || true)
              if [ -z "$BASE_RPT" ]; then
                echo "::warning::Skipping kernel '$KVER': failed to derive +rpt base version"
                continue
              fi

              COMMON_PKG="linux-headers-${BASE_RPT}-common-rpi"
              if ! apt download "$COMMON_PKG:$APT_ARCH" >/dev/null 2>&1; then
                if ! apt download "$COMMON_PKG" >/dev/null 2>&1; then
                  echo "::warning::Skipping kernel '$KVER': missing common headers package '$COMMON_PKG'"
                  continue
                fi
              fi

              KBUILD_PKG="linux-kbuild-${BASE_RPT}"
              if ! apt download "$KBUILD_PKG:$HOST_ARCH" >/dev/null 2>&1; then
                if ! apt download "$KBUILD_PKG" >/dev/null 2>&1; then
                  echo "::warning::Skipping kernel '$KVER': missing host kbuild package '$KBUILD_PKG'"
                  continue
                fi
              fi
            else
              # Ubuntu raspi packages usually use linux-kbuild-<major.minor>.
              KBUILD_PKG="linux-kbuild-${LINE}"
              if ! apt download "$KBUILD_PKG:$HOST_ARCH" >/dev/null 2>&1; then
                if ! apt download "$KBUILD_PKG" >/dev/null 2>&1; then
                  echo "::warning::Skipping kernel '$KVER': host kbuild package '$KBUILD_PKG' not found"
                  continue
                fi
              fi
            fi

            if ! echo "$KVER|$APT_ARCH|$HEADER_PKG|$FAMILY|$CORE|$LINE" >> kernel_targets.txt; then
              echo "::warning::Skipping kernel '$KVER': failed to add target record"
              continue
            fi
          done < selected_targets.txt

          if [ -s kernel_targets.txt ]; then
            sort -u kernel_targets.txt -o kernel_targets.txt
          fi

          RPI_BUILD_TARGET_COUNT="$(awk -F'|' '$4 == "rpi" { c++ } END { print c+0 }' kernel_targets.txt)"
          UBUNTU_BUILD_TARGET_COUNT="$(awk -F'|' '$4 == "ubuntu" { c++ } END { print c+0 }' kernel_targets.txt)"
          echo "Build-target families: rpi=$RPI_BUILD_TARGET_COUNT ubuntu=$UBUNTU_BUILD_TARGET_COUNT"

          FAMILY_POLICY_FAILED=false
          FAMILY_POLICY_REASON=""
          if [ "$INCLUDE_RPI" -eq 1 ] && [ "$RPI_BUILD_TARGET_COUNT" -eq 0 ]; then
            FAMILY_POLICY_FAILED=true
            FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}rpi=0"
          fi
          if [ "$INCLUDE_UBUNTU" -eq 1 ] && [ "$UBUNTU_BUILD_TARGET_COUNT" -eq 0 ]; then
            FAMILY_POLICY_FAILED=true
            FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}ubuntu=0"
          fi

          if [ ! -s kernel_targets.txt ]; then
            REASON="no kernels passed package download checks"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "selected_target_count=$SELECTED_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "selected_rpi_count=$RPI_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "selected_ubuntu_count=$UBUNTU_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_rpi_count=$RPI_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_ubuntu_count=$UBUNTU_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "family_policy_failed=$FAMILY_POLICY_FAILED" >> "$GITHUB_OUTPUT"
            echo "family_policy_reason=$FAMILY_POLICY_REASON" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Selected build targets (kver|arch|pkg|family|core|line):"
          cat kernel_targets.txt

          echo "== Downloaded .deb files =="
          ls -lh "$GITHUB_WORKSPACE"/*.deb || echo "No debs found"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "dry_run=false" >> "$GITHUB_OUTPUT"
          echo "selected_target_count=$SELECTED_TARGET_COUNT" >> "$GITHUB_OUTPUT"
          echo "selected_rpi_count=$RPI_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
          echo "selected_ubuntu_count=$UBUNTU_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
          echo "build_target_rpi_count=$RPI_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
          echo "build_target_ubuntu_count=$UBUNTU_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
          echo "family_policy_failed=$FAMILY_POLICY_FAILED" >> "$GITHUB_OUTPUT"
          echo "family_policy_reason=$FAMILY_POLICY_REASON" >> "$GITHUB_OUTPUT"

      - name: Build against kernels
        id: build
        if: steps.download_headers.outputs.skip != 'true'
        working-directory: ${{ inputs.module_path }}
        continue-on-error: true
        run: |
          set -euo pipefail

          FAIL=0
          HOST_ARCH="$(dpkg --print-architecture)"
          echo "Runner host architecture in build step: $HOST_ARCH"
          OKS=0
          FAILS=0
          SKIPS=0
          TARGETS=0
          ARTIFACT_ROOT="${RUNNER_TEMP}/kmod-artifacts"

          # Stage artifacts outside the module tree to avoid accidental cleanup by local make targets.
          rm -rf "$ARTIFACT_ROOT"
          mkdir -p "$ARTIFACT_ROOT"

          # Clean up and create extraction root ONCE per build
          rm -rf root
          mkdir root

          while IFS='|' read -r KVER APT_ARCH HEADER_PKG FAMILY CORE LINE; do
            [ -z "$KVER" ] && continue
            TARGETS=$((TARGETS + 1))

            HEADERS_DEB=$(ls "$GITHUB_WORKSPACE"/${HEADER_PKG}_*.deb | grep -E "_${APT_ARCH}\.deb$" | head -n1 || true)
            if [ -z "$HEADERS_DEB" ] || [ ! -s "$HEADERS_DEB" ]; then
              echo "::warning::Skipping kernel $KVER: missing downloaded headers deb"
              SKIPS=$((SKIPS + 1))
              continue
            fi

            COMMON_DEB=""
            BASE_RPT=""
            if [ "$FAMILY" = "rpi" ]; then
              BASE_RPT=$(echo "$KVER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\+rpt' || true)
              COMMON_DEB=$(ls "$GITHUB_WORKSPACE"/linux-headers-${BASE_RPT}-common-rpi*.deb | grep -E "_(${APT_ARCH}|all)\.deb$" | head -n1 || true)
              if [ -z "$COMMON_DEB" ] || [ ! -s "$COMMON_DEB" ]; then
                echo "::warning::Skipping kernel $KVER: missing common headers deb"
                SKIPS=$((SKIPS + 1))
                continue
              fi
            fi

            KBUILD_DEB=""
            if [ "$FAMILY" = "rpi" ] && [ -n "$BASE_RPT" ]; then
              KBUILD_DEB=$(ls "$GITHUB_WORKSPACE"/linux-kbuild-${BASE_RPT}*.deb | grep -E "_(${HOST_ARCH}|all)\.deb$" | head -n1 || true)
            else
              KBUILD_DEB=$(ls "$GITHUB_WORKSPACE"/linux-kbuild-${LINE}*.deb | grep -E "_(${HOST_ARCH}|all)\.deb$" | head -n1 || true)
            fi
            if [ -z "$KBUILD_DEB" ] || [ ! -s "$KBUILD_DEB" ]; then
              echo "::warning::Skipping kernel $KVER: missing host kbuild deb"
              SKIPS=$((SKIPS + 1))
              continue
            fi

            echo "Preparing to extract: $HEADERS_DEB ${COMMON_DEB:-<none>} $KBUILD_DEB"

            KBUILD_DEB_ARCH="$(dpkg-deb -f "$KBUILD_DEB" Architecture || true)"
            echo "Selected kbuild deb architecture: ${KBUILD_DEB_ARCH:-unknown} (host: $HOST_ARCH)"
            if [ "$KBUILD_DEB_ARCH" != "$HOST_ARCH" ] && [ "$KBUILD_DEB_ARCH" != "all" ]; then
              echo "::error::Kernel $KVER failed: kbuild package architecture does not match host"
              FAIL=1
              FAILS=$((FAILS + 1))
              continue
            fi

            rm -rf root
            mkdir root
            if ! dpkg-deb -x "$HEADERS_DEB" root/; then
              echo "::warning::Skipping kernel $KVER: failed to extract headers"
              SKIPS=$((SKIPS + 1))
              continue
            fi
            if [ -n "$COMMON_DEB" ] && ! dpkg-deb -x "$COMMON_DEB" root/; then
              echo "::warning::Skipping kernel $KVER: failed to extract common headers"
              SKIPS=$((SKIPS + 1))
              continue
            fi
            if ! dpkg-deb -x "$KBUILD_DEB" root/; then
              echo "::warning::Skipping kernel $KVER: failed to extract kbuild"
              SKIPS=$((SKIPS + 1))
              continue
            fi

            echo "== Package architecture metadata =="
            dpkg-deb -f "$HEADERS_DEB" Package Version Architecture || true
            [ -n "$COMMON_DEB" ] && dpkg-deb -f "$COMMON_DEB" Package Version Architecture || true
            dpkg-deb -f "$KBUILD_DEB" Package Version Architecture || true
            echo "== After extraction, /usr/src contains =="
            ls -lh root/usr/src || true
            echo "== Disk usage of extracted headers =="
            du -sh root/usr/src/* || true

            echo "== Extracted /usr/src contents =="
            ls -l root/usr/src || true
            echo "== Find Makefile under root/ =="
            find root/ -name Makefile || true
            echo "== Host/target info =="
            uname -m || true
            dpkg --print-architecture || true

            # Infer kernel architecture from package metadata.
            case "$APT_ARCH" in
              arm64)
                if [ "$HOST_ARCH" = "arm64" ]; then
                  CROSS_COMPILE=""
                else
                  CROSS_COMPILE="aarch64-linux-gnu-"
                fi
                KARCH="arm64"
                ;;
              armhf)
                CROSS_COMPILE="arm-linux-gnueabihf-"
                KARCH="arm"
                ;;
              *)
                echo "::warning::Skipping kernel $KVER: unsupported inferred package architecture '$APT_ARCH'"
                SKIPS=$((SKIPS + 1))
                continue
                ;;
            esac

            # Always use the arch/flavor-specific headers directory for building
            HDRDIR=""
            if [ -d "root/usr/src/$HEADER_PKG" ]; then
              HDRDIR="$HEADER_PKG"
            else
              HDRDIR=$(ls root/usr/src | grep "linux-headers-$KVER" | head -n1 || true)
            fi
            if [ -z "$HDRDIR" ]; then
              echo "::warning::Skipping kernel $KVER: specific headers directory missing"
              SKIPS=$((SKIPS + 1))
              continue
            fi
            KDIR="$GITHUB_WORKSPACE/root/usr/src/$HDRDIR"

            echo "Headers version: $HDRDIR"
            echo "Build dir: $KDIR"

            # Symlink /usr/src to extracted headers so Makefile references work.
            # This helps with header scripts that assume /usr/src paths.
            sudo rm -rf /usr/src
            sudo ln -s "$GITHUB_WORKSPACE/root/usr/src" /usr/src

            # Mimic local user flow while binding to selected downloaded headers.
            # Local make uses KVER -> /lib/modules/<KVER>/build, so wire that path explicitly.
            echo "Binding /lib/modules/$KVER/build -> $KDIR"
            sudo mkdir -p "/lib/modules/$KVER"
            sudo rm -rf "/lib/modules/$KVER/build"
            sudo ln -s "$KDIR" "/lib/modules/$KVER/build"

            echo "== Kbuild tools/debug =="
            FIXDEP_PATH=$(find root -path '*/scripts/basic/fixdep' | head -n1 || true)
            if [ -n "$FIXDEP_PATH" ]; then
              ls -l "$FIXDEP_PATH" || true
              file "$FIXDEP_PATH" || true
            else
              echo "fixdep path not found under extracted tree"
            fi

            if [ -n "$CROSS_COMPILE" ]; then
              CC_BIN="${CROSS_COMPILE}gcc-12"
            else
              CC_BIN="gcc-12"
            fi
            echo "Selected compiler binary: $CC_BIN"
            if ! command -v "$CC_BIN" >/dev/null 2>&1; then
              echo "::error::Kernel $KVER failed: compiler not found ($CC_BIN)"
              FAIL=1
              FAILS=$((FAILS + 1))
              continue
            fi
            "$CC_BIN" --version || true

            echo "Running local-style build commands from module directory"
            echo "Command: make clean"
            echo "Command: make"

            # Export architecture/toolchain variables so local make path remains explicit and debuggable.
            export ARCH="$KARCH"
            export CROSS_COMPILE="$CROSS_COMPILE"
            export CC="$CC_BIN"
            export KVER="$KVER"
            KO_COUNT=0
            DTBO_COUNT=0

            # Keep clean non-fatal: first build on a fresh checkout may not have artifacts to clean.
            make clean || true

            if make; then
              KO_COUNT="$(find . -maxdepth 1 -type f -name '*.ko' | wc -l | tr -d ' ')"
              DTBO_COUNT="$(find . -maxdepth 1 -type f -name '*.dtbo' | wc -l | tr -d ' ')"
              echo "Produced artifacts count: ko=$KO_COUNT dtbo=$DTBO_COUNT"

              # Strict contract: both outputs are expected from local make flow.
              if [ "$KO_COUNT" -eq 0 ] || [ "$DTBO_COUNT" -eq 0 ]; then
                echo "::error::Kernel $KVER failed: expected .ko and .dtbo outputs are required"
                FAIL=1
                FAILS=$((FAILS + 1))
              else
                echo "Build OK for kernel $KVER"
                OKS=$((OKS + 1))
              fi
            else
              echo "::error::Kernel $KVER failed: make returned non-zero"
              FAIL=1
              FAILS=$((FAILS + 1))
            fi

            if [ "$KO_COUNT" -gt 0 ] && [ "$DTBO_COUNT" -gt 0 ]; then
              OUT="$ARTIFACT_ROOT/$APT_ARCH/module-artifacts-$KVER"
              mkdir -p "$OUT"
              find . -maxdepth 1 -type f -name '*.ko' -print -exec cp -v {} "$OUT/" \;
              find . -maxdepth 1 -type f -name '*.dtbo' -print -exec cp -v {} "$OUT/" \;
            fi
          done < "$GITHUB_WORKSPACE/kernel_targets.txt"

          echo "== Staged artifact files =="
          find "$ARTIFACT_ROOT" -type f | sort || true
          STAGED_ARTIFACT_COUNT="$(find "$ARTIFACT_ROOT" -type f | wc -l | tr -d ' ')"
          [ -z "$STAGED_ARTIFACT_COUNT" ] && STAGED_ARTIFACT_COUNT=0
          echo "Staged artifact file count: $STAGED_ARTIFACT_COUNT"

          echo "Total builds: $((OKS+FAILS+SKIPS)), OK: $OKS, SKIP: $SKIPS, FAIL: $FAILS"
          echo "target_count=$TARGETS" >> "$GITHUB_OUTPUT"
          echo "ok_count=$OKS" >> "$GITHUB_OUTPUT"
          echo "skip_count=$SKIPS" >> "$GITHUB_OUTPUT"
          echo "fail_count=$FAILS" >> "$GITHUB_OUTPUT"
          exit $FAIL

      - name: Upload artifacts
        if: always() && steps.download_headers.outputs.skip != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: kmod-artifacts
          path: ${{ runner.temp }}/kmod-artifacts/

      - name: Show final status
        if: always()
        run: |
          if [ "${{ steps.download_headers.outcome }}" = "failure" ]; then
            echo "::error::FAIL: kernel selection/header preparation failed"
            exit 1
          fi

          if [ "${{ steps.download_headers.outputs.dry_run }}" = "true" ]; then
            SELECTED="${{ steps.download_headers.outputs.selected_target_count }}"
            [ -z "$SELECTED" ] && SELECTED=0
            echo "::notice::DRY-RUN: selected_targets=$SELECTED"
            exit 0
          fi

          if [ "${{ steps.download_headers.outputs.skip }}" = "true" ]; then
            if [ "${{ steps.download_headers.outputs.family_policy_failed }}" = "true" ]; then
              echo "::error::FAIL: family policy violation (required families missing): ${{ steps.download_headers.outputs.family_policy_reason }} selected[rpi=${{ steps.download_headers.outputs.selected_rpi_count }},ubuntu=${{ steps.download_headers.outputs.selected_ubuntu_count }}] build_targets[rpi=${{ steps.download_headers.outputs.build_target_rpi_count }},ubuntu=${{ steps.download_headers.outputs.build_target_ubuntu_count }}]"
              exit 1
            fi
            echo "::warning::SKIP: ${{ steps.download_headers.outputs.skip_reason }}"
            exit 0
          fi

          if [ "${{ steps.download_headers.outputs.family_policy_failed }}" = "true" ]; then
            echo "::error::FAIL: family policy violation (required families missing): ${{ steps.download_headers.outputs.family_policy_reason }} selected[rpi=${{ steps.download_headers.outputs.selected_rpi_count }},ubuntu=${{ steps.download_headers.outputs.selected_ubuntu_count }}] build_targets[rpi=${{ steps.download_headers.outputs.build_target_rpi_count }},ubuntu=${{ steps.download_headers.outputs.build_target_ubuntu_count }}]"
            exit 1
          fi

          TARGETS="${{ steps.build.outputs.target_count }}"
          OKS="${{ steps.build.outputs.ok_count }}"
          SKIPS="${{ steps.build.outputs.skip_count }}"
          FAILS="${{ steps.build.outputs.fail_count }}"
          [ -z "$TARGETS" ] && TARGETS=0
          [ -z "$OKS" ] && OKS=0
          [ -z "$SKIPS" ] && SKIPS=0
          [ -z "$FAILS" ] && FAILS=0

          if [ "$FAILS" -gt 0 ]; then
            echo "::error::FAIL: targets=$TARGETS ok=$OKS skip=$SKIPS fail=$FAILS"
          elif [ "$OKS" -gt 0 ]; then
            echo "::notice::OK: targets=$TARGETS ok=$OKS skip=$SKIPS fail=$FAILS artifacts=.ko+.dtbo"
          else
            echo "::warning::WARN: targets=$TARGETS ok=$OKS skip=$SKIPS fail=$FAILS"
          fi

      - name: Fail with context
        if: steps.download_headers.outputs.skip != 'true' && steps.build.outcome == 'failure'
        run: |
          echo "::error::One or more kernel target builds failed"
          exit 1
