name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      kernel_branches:
        required: true
        type: string
      defconfig_arch_matrix:
        required: true
        type: string
      module_path:
        required: false
        type: string
        default: '.'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(inputs.kernel_branches) }}

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential bc bison flex libssl-dev make \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf \
            device-tree-compiler jq

      - name: Checkout Raspberry Pi kernel
        run: |
          git clone \
            --depth=1 \
            --filter=blob:none \
            --single-branch \
            --branch ${{ matrix.branch }} \
            https://github.com/raspberrypi/linux.git kernel

      - name: Build all defconfigs for branch
        id: build
        working-directory: ${{ inputs.module_path }}
        continue-on-error: true
        run: |
          set -euo pipefail

          COMBOS='${{ inputs.defconfig_arch_matrix }}'
          FAIL=0

          echo "$COMBOS" | jq -c '.[]' | while read combo; do
            defconfig=$(echo "$combo" | jq -r .defconfig)
            arch=$(echo "$combo" | jq -r .arch)

            echo "========================================"
            echo "Branch: ${{ matrix.branch }}"
            echo "Defconfig: $defconfig"
            echo "Arch: $arch"
            echo "========================================"

            case "$arch" in
              arm64)
                export ARCH=arm64
                export CROSS_COMPILE=aarch64-linux-gnu-
                ;;
              arm)
                export ARCH=arm
                export CROSS_COMPILE=arm-linux-gnueabihf-
                ;;
              *)
                echo "Unknown arch: $arch"
                FAIL=1
                continue
                ;;
            esac

            # Prepare kernel
            if ! make -C "$GITHUB_WORKSPACE/kernel" "$defconfig"; then
              echo "❌ defconfig failed"
              FAIL=1
              continue
            fi

            if ! make -C "$GITHUB_WORKSPACE/kernel" modules_prepare; then
              echo "❌ modules_prepare failed"
              FAIL=1
              continue
            fi

            # Build module
            if ! make -C "$GITHUB_WORKSPACE/kernel" M="$PWD" modules; then
              echo "❌ module build failed"
              FAIL=1
              continue
            fi

            # Collect artifacts
            OUT="$GITHUB_WORKSPACE/artifacts/${{ matrix.branch }}/$arch/$defconfig"
            mkdir -p "$OUT"

            cp -v ./*.ko "$OUT/" 2>/dev/null || true
            cp -v ./*.dtbo "$OUT/" 2>/dev/null || true

          done

          exit $FAIL

      - name: Detect module name
        if: steps.build.outcome == 'success'
        id: detect_mod
        working-directory: ${{ inputs.module_path }}
        run: |
          if [ ! -f MODULE_NAME ]; then
            echo "MODULE_NAME file not found!" >&2
            exit 1
          fi
          echo "MODULE_NAME=$(cat MODULE_NAME)" >> $GITHUB_ENV

      - name: Upload artifacts
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ko-${{ matrix.branch }}
          path: artifacts/${{ matrix.branch }}/

      - name: Fail with context
        if: steps.build.outcome == 'failure'
        run: |
          echo "❌ One or more builds failed for branch ${{ matrix.branch }}"
          exit 1
