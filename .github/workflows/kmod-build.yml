name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      archs:
        required: true
        type: string
      kernel_count:
        required: false
        type: number
        default: 3
      kernel_version:
        required: false
        type: string
        default: ''
      module_path:
        required: false
        type: string
        default: '.'
      rpi_codename:
        required: false
        type: string
        default: 'bookworm'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(inputs.archs) }}

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          # Install build tools and gcc-12 cross-compilers expected by RPi kernel headers
          sudo apt install -y build-essential jq curl xz-utils gnupg gcc-12-aarch64-linux-gnu gcc-12-arm-linux-gnueabihf

      - name: Enable arm64 architecture for apt
        run: |
          sudo dpkg --add-architecture arm64
          # Allow apt-get update to succeed even if some arm64 indexes are missing
          sudo apt-get update --allow-releaseinfo-change || true

      - name: Add Raspberry Pi OS repository and GPG key
        run: |
          CODENAME="${{ inputs.rpi_codename }}"
          echo "deb http://archive.raspberrypi.org/debian/ $CODENAME main" | sudo tee /etc/apt/sources.list.d/raspi.list
          curl -fsSL https://archive.raspberrypi.org/debian/raspberrypi.gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/raspberrypi.gpg
          sudo apt-get update --allow-releaseinfo-change || true

      - name: Download kernel headers deb(s) with apt
        id: download_headers
        run: |
          set -e
          KERNEL_VERSION="${{ inputs.kernel_version }}"
          COUNT=${{ inputs.kernel_count }}
          ARCH="${{ matrix.arch }}"
          if [ -n "$KERNEL_VERSION" ]; then
            # Download arch-specific headers
            apt download linux-headers-$KERNEL_VERSION:$ARCH || (echo "::error::Failed to download linux-headers-$KERNEL_VERSION:$ARCH" && exit 1)
            # Extract base version for common headers (e.g., 6.12.75+rpt)
            BASE_VERSION=$(echo "$KERNEL_VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\+rpt')
            COMMON_PKG="linux-headers-${BASE_VERSION}-common-rpi"
            KBUILD_PKG="linux-kbuild-${BASE_VERSION}"
            # Try to download common headers for arch, fallback to 'all' if not found
            if ! apt download "$COMMON_PKG:$ARCH"; then
              echo "::notice::Falling back to $COMMON_PKG (arch: all)"
              if ! apt download "$COMMON_PKG"; then
                echo "::error::Failed to download $COMMON_PKG:$ARCH or $COMMON_PKG (all)" && exit 1
              fi
            fi
            # Download matching kbuild package required by scripts symlinks in common headers
            apt download "$KBUILD_PKG:$ARCH" || (echo "::error::Failed to download $KBUILD_PKG:$ARCH" && exit 1)
            echo "$KERNEL_VERSION" > kernel_versions.txt
          else
            # Autodetect latest kernel_count versions using apt list
            # Match any major version, restrict to valid RPi kernel version patterns (e.g., 6.1.21+rpt, 7.0.0+rpt, etc)
            apt list -a 2>/dev/null | grep linux-headers | grep :$ARCH | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?\+rpt[^ ]*' | sort -uV | tail -n $COUNT > kernel_versions.txt
            echo "Detected kernel versions:"; cat kernel_versions.txt
          fi
          echo "== Downloaded .deb files =="
          ls -lh $GITHUB_WORKSPACE/*.deb || echo "No debs found"

      - name: Set kernel versions for build
        id: kernels
        run: |
          set -e
          cat kernel_versions.txt | jq -R . | jq -s -c . > kernel_versions.json
          echo "kernels=$(cat kernel_versions.json)" >> $GITHUB_OUTPUT

      - name: Build against kernels
        id: build
        working-directory: ${{ inputs.module_path }}
        continue-on-error: true
        run: |
          set -euo pipefail

          FAIL=0
          SUMMARY="$GITHUB_WORKSPACE/summary.txt"
          ARCH="${{ matrix.arch }}"
          echo "| Kernel | Arch | Result | Note |" > "$SUMMARY"
          echo "|--------|------|--------|------|" >> "$SUMMARY"

          # Clean up and create extraction root ONCE per build
          rm -rf root
          mkdir root

          while read KVER; do
            HEADERS_DEB=$(ls $GITHUB_WORKSPACE/linux-headers-$KVER*.deb | grep -v common | head -n1)
            BASE_VERSION=$(echo "$KVER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\+rpt')
            COMMON_DEB=$(ls $GITHUB_WORKSPACE/linux-headers-${BASE_VERSION}-common-rpi*.deb | head -n1)
            KBUILD_DEB=$(ls $GITHUB_WORKSPACE/linux-kbuild-${BASE_VERSION}*.deb | head -n1)
            echo "Preparing to extract: $HEADERS_DEB, $COMMON_DEB and $KBUILD_DEB"
            if [ ! -s "$HEADERS_DEB" ] || [ ! -s "$COMMON_DEB" ] || [ ! -s "$KBUILD_DEB" ]; then
              echo "❌ Downloaded package deb not found or empty: $HEADERS_DEB $COMMON_DEB $KBUILD_DEB"
              echo "| $HEADERS_DEB $COMMON_DEB $KBUILD_DEB | $ARCH | SKIP | download failed |" >> "$SUMMARY"
              continue
            fi
            rm -rf root
            mkdir root
            if ! dpkg-deb -x "$HEADERS_DEB" root/; then
              echo "❌ Failed to extract $HEADERS_DEB"
              echo "| $HEADERS_DEB | ${{ matrix.arch }} | SKIP | extract failed |" >> "$SUMMARY"
              continue
            fi
            if ! dpkg-deb -x "$COMMON_DEB" root/; then
              echo "❌ Failed to extract $COMMON_DEB"
              echo "| $COMMON_DEB | $ARCH | SKIP | extract failed |" >> "$SUMMARY"
              continue
            fi
            if ! dpkg-deb -x "$KBUILD_DEB" root/; then
              echo "❌ Failed to extract $KBUILD_DEB"
              echo "| $KBUILD_DEB | $ARCH | SKIP | extract failed |" >> "$SUMMARY"
              continue
            fi
            echo "== After extraction, /usr/src contains =="
            ls -lh root/usr/src || true
            echo "== Disk usage of extracted headers =="
            du -sh root/usr/src/* || true

            # Debug: list extracted src dirs and Makefiles
            echo "== Extracted /usr/src contents =="
            ls -l root/usr/src || true
            echo "== Find Makefile under root/ =="
            find root/ -name Makefile || true

            # Check for common headers directory
            if [ ! -d "root/usr/src/linux-headers-${BASE_VERSION}-common-rpi" ]; then
              echo "❌ Common headers directory missing after extraction!"
              echo "| $HEADERS_DEB $COMMON_DEB | $ARCH | SKIP | no common headers dir |" >> "$SUMMARY"
              continue
            fi

            # Always use the arch/flavor-specific headers directory for building
            HDRDIR=$(ls root/usr/src | grep "linux-headers-$KVER" || true)
            if [ -z "$HDRDIR" ]; then
              echo "❌ Arch/flavor-specific linux-headers directory not found after extracting $HEADERS_DEB and $COMMON_DEB"
              echo "| $HEADERS_DEB $COMMON_DEB | $ARCH | SKIP | no specific headers dir |" >> "$SUMMARY"
              continue
            fi
            KDIR="$GITHUB_WORKSPACE/root/usr/src/$HDRDIR"

            echo "Headers version: $HDRDIR"
            echo "Build dir: $KDIR"

            # Symlink /usr/src to extracted headers so Makefile references work
            sudo rm -rf /usr/src
            sudo ln -s "$GITHUB_WORKSPACE/root/usr/src" /usr/src

            echo "Running: make -C $KDIR M=$PWD modules"

            if make -C "$KDIR" M="$PWD" modules; then
              echo "✅ Build OK"
              RESULT="OK"
              NOTE=""
            else
              echo "❌ Build failed"
              RESULT="FAIL"
              NOTE=""
              FAIL=1
            fi

            echo "| $HDRDIR | $ARCH | $RESULT | $NOTE |" >> "$SUMMARY"

            if [ "$RESULT" = "OK" ]; then
              OUT="$GITHUB_WORKSPACE/artifacts/$ARCH/$HDRDIR"
              mkdir -p "$OUT"
              cp -v ./*.ko "$OUT/" 2>/dev/null || true
              cp -v ./*.dtbo "$OUT/" 2>/dev/null || true
            fi
          done < kernel_versions.txt

          echo ""
          OKS=$(grep -c '|.*|.*| OK |' "$SUMMARY" || true)
          FAILS=$(grep -c '|.*|.*| FAIL |' "$SUMMARY" || true)
          echo "========== BUILD SUMMARY =========="
          cat "$SUMMARY"
          echo "=================================="
          echo "Total builds: $((OKS+FAILS)), OK: $OKS, FAIL: $FAILS"
          exit $FAIL

      - name: Detect module name
        if: steps.build.outcome == 'success'
        working-directory: ${{ inputs.module_path }}
        run: |
          if [ ! -f MODULE_NAME ]; then
            echo "MODULE_NAME file not found!" >&2
            exit 1
          fi
          echo "MODULE_NAME=$(cat MODULE_NAME)" >> $GITHUB_ENV

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ko-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/

      - name: Show build summary
        if: always()
        run: |
          echo "::notice file=summary.txt::$(cat $GITHUB_WORKSPACE/summary.txt)"

      - name: Fail with context
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error::❌ One or more builds failed for arch ${{ matrix.arch }}"
          exit 1
