name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      archs:
        required: true
        type: string
      kernel_count:
        required: false
        type: number
        default: 3
      module_path:
        required: false
        type: string
        default: '.'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(inputs.archs) }}

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            bc bison flex libssl-dev make \
            jq curl xz-utils

      - name: Detect latest Raspberry Pi kernels
        id: kernels
        run: |
          set -e

          ARCH="${{ matrix.arch }}"
          COUNT=${{ inputs.kernel_count }}

          BASE_URL="https://archive.raspberrypi.org/debian/pool/main/l/linux"


          # Download and filter unique kernel images
          curl -s "$BASE_URL/" \
            | grep -o "linux-image-[^\" ]*${ARCH}\.deb" \
            | sort -u \
            | sort -V \
            | tail -n $COUNT > kernels.txt

          echo "Detected kernels:"
          cat kernels.txt

          echo "kernels=$(jq -R . kernels.txt | jq -s -c .)" >> $GITHUB_OUTPUT

      - name: Build against kernels
        id: build
        working-directory: ${{ inputs.module_path }}
        continue-on-error: true
        run: |
          set -euo pipefail

          BASE_URL="https://archive.raspberrypi.org/debian/pool/main/l/linux"
          FAIL=0

          SUMMARY="$GITHUB_WORKSPACE/summary.txt"
          echo "| Kernel | Arch | Result | Note |" > "$SUMMARY"
          echo "|--------|------|--------|------|" >> "$SUMMARY"

          # Track missing image/header pairs
          MISSING_PAIRS="$GITHUB_WORKSPACE/missing_pairs.txt"
          : > "$MISSING_PAIRS"

          echo '${{ steps.kernels.outputs.kernels }}' | jq -r '.[]' | while read IMAGE_DEB; do

            HEADERS_DEB=$(echo "$IMAGE_DEB" | sed 's/linux-image-/linux-headers-/')

            echo "========================================"
            echo "Processing: $IMAGE_DEB"
            echo "========================================"

            IMAGE_OK=0
            HEADERS_OK=0
            if curl --silent --head --fail "$BASE_URL/$IMAGE_DEB" > /dev/null; then
              IMAGE_OK=1
            fi
            if curl --silent --head --fail "$BASE_URL/$HEADERS_DEB" > /dev/null; then
              HEADERS_OK=1
            fi

            if [ "$IMAGE_OK" -eq 0 ] && [ "$HEADERS_OK" -eq 0 ]; then
              echo "⚠️ Both image and headers not found, skipping"
              echo "| $IMAGE_DEB | ${{ matrix.arch }} | SKIP | both missing |" >> "$SUMMARY"
              echo "$IMAGE_DEB: both image and headers missing" >> "$MISSING_PAIRS"
              continue
            fi
            if [ "$IMAGE_OK" -eq 0 ]; then
              echo "⚠️ Kernel image not found, skipping"
              echo "| $IMAGE_DEB | ${{ matrix.arch }} | SKIP | image missing |" >> "$SUMMARY"
              echo "$IMAGE_DEB: image missing" >> "$MISSING_PAIRS"
              continue
            fi
            if [ "$HEADERS_OK" -eq 0 ]; then
              echo "⚠️ Headers not found, skipping"
              echo "| $IMAGE_DEB | ${{ matrix.arch }} | SKIP | headers missing |" >> "$SUMMARY"
              echo "$IMAGE_DEB: headers missing" >> "$MISSING_PAIRS"
              continue
            fi

            rm -rf root *.deb

            curl -s -O "$BASE_URL/$HEADERS_DEB"

            # Check if headers deb was downloaded and is not empty
            if [ ! -s "$HEADERS_DEB" ]; then
              echo "❌ Failed to download $HEADERS_DEB or file is empty"
              echo "| $HEADERS_DEB | ${{ matrix.arch }} | SKIP | download failed |" >> "$SUMMARY"
              echo "$HEADERS_DEB: download failed" >> "$MISSING_PAIRS"
              continue
            fi

            mkdir root
            if ! dpkg-deb -x "$HEADERS_DEB" root/; then
              echo "❌ Failed to extract $HEADERS_DEB"
              echo "| $HEADERS_DEB | ${{ matrix.arch }} | SKIP | extract failed |" >> "$SUMMARY"
              echo "$HEADERS_DEB: extract failed" >> "$MISSING_PAIRS"
              continue
            fi

            KVER=$(ls root/usr/src | grep -m1 'linux-headers' || true)
            if [ -z "$KVER" ]; then
              echo "❌ No linux-headers directory found after extracting $HEADERS_DEB"
              echo "| $HEADERS_DEB | ${{ matrix.arch }} | SKIP | no headers dir |" >> "$SUMMARY"
              echo "$HEADERS_DEB: no headers dir" >> "$MISSING_PAIRS"
              continue
            fi
            KDIR="$GITHUB_WORKSPACE/root/usr/src/$KVER"

            echo "Headers version: $KVER"
            echo "Build dir: $KDIR"

            if make -C "$KDIR" M="$PWD" modules; then
              echo "✅ Build OK"
              RESULT="OK"
              NOTE=""
            else
              echo "❌ Build failed"
              RESULT="FAIL"
              NOTE=""
              FAIL=1
            fi

            echo "| $KVER | ${{ matrix.arch }} | $RESULT | $NOTE |" >> "$SUMMARY"

            if [ "$RESULT" = "OK" ]; then
              OUT="$GITHUB_WORKSPACE/artifacts/${{ matrix.arch }}/$KVER"
              mkdir -p "$OUT"

              cp -v ./*.ko "$OUT/" 2>/dev/null || true
              cp -v ./*.dtbo "$OUT/" 2>/dev/null || true
            fi

          done

          echo ""
          echo "========== BUILD SUMMARY =========="
          cat "$SUMMARY"
          echo "=================================="


          # Log missing pairs summary if any
          if [ -s "$MISSING_PAIRS" ]; then
            echo "" >> "$SUMMARY"
            echo "## Missing image/header pairs:" >> "$SUMMARY"
            cat "$MISSING_PAIRS" >> "$SUMMARY"
            echo "" >> "$SUMMARY"
            echo "⚠️ Some kernel image/header pairs were missing. See summary above."
          fi

          exit $FAIL

      - name: Detect module name
        if: steps.build.outcome == 'success'
        working-directory: ${{ inputs.module_path }}
        run: |
          if [ ! -f MODULE_NAME ]; then
            echo "MODULE_NAME file not found!" >&2
            exit 1
          fi
          echo "MODULE_NAME=$(cat MODULE_NAME)" >> $GITHUB_ENV

      - name: Upload artifacts
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ko-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/

      - name: Fail with context
        if: steps.build.outcome == 'failure'
        run: |
          echo "❌ One or more builds failed for arch ${{ matrix.arch }}"
          exit 1
