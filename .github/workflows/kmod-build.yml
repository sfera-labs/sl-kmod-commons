name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      archs:
        required: true
        type: string
      kernel_count:
        required: false
        type: number
        default: 3
      kernel_version:
        required: false
        type: string
        default: ''
      module_path:
        required: false
        type: string
        default: '.'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(inputs.archs) }}

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential jq curl xz-utils gnupg

      - name: Enable arm64 architecture for apt
        run: |
          sudo dpkg --add-architecture arm64
          # Allow apt-get update to succeed even if some arm64 indexes are missing
          sudo apt-get update --allow-releaseinfo-change || true

      - name: Add Raspberry Pi OS repository and GPG key
        run: |
          echo "deb http://archive.raspberrypi.org/debian/ bookworm main" | sudo tee /etc/apt/sources.list.d/raspi.list
          curl -fsSL https://archive.raspberrypi.org/debian/raspberrypi.gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/raspberrypi.gpg
          sudo apt-get update --allow-releaseinfo-change || true

      - name: Download kernel headers deb(s) with apt
        id: download_headers
        run: |
          set -e
          KERNEL_VERSION="${{ inputs.kernel_version }}"
          COUNT=${{ inputs.kernel_count }}
          ARCH="${{ matrix.arch }}"
          if [ -n "$KERNEL_VERSION" ]; then
            # Download only the specified version
            apt download linux-headers-$KERNEL_VERSION:arm64 || (echo "::error::Failed to download linux-headers-$KERNEL_VERSION:arm64" && exit 1)
            echo "$KERNEL_VERSION" > kernel_versions.txt
          else
            # Autodetect latest kernel_count versions using apt list
            apt list -a 2>/dev/null | grep linux-headers | grep :arm64 | grep -o '6\.[^ ]*' | sort -uV | tail -n $COUNT > kernel_versions.txt
            echo "Detected kernel versions:"; cat kernel_versions.txt
            while read VER; do
              apt download linux-headers-$VER:arm64 || echo "::error::Failed to download linux-headers-$VER:arm64"
            done < kernel_versions.txt
          fi

      - name: Set kernel versions for build
        id: kernels
        run: |
          set -e
          cat kernel_versions.txt | jq -R . | jq -s -c . > kernel_versions.json
          echo "kernels=$(cat kernel_versions.json)" >> $GITHUB_OUTPUT

      - name: Build against kernels
        id: build
        working-directory: ${{ inputs.module_path }}
        continue-on-error: true
        run: |
          set -euo pipefail

          FAIL=0
          SUMMARY="$GITHUB_WORKSPACE/summary.txt"
          echo "| Kernel | Arch | Result | Note |" > "$SUMMARY"
          echo "|--------|------|--------|------|" >> "$SUMMARY"

          # Clean up and extract the downloaded deb
          rm -rf root
          mkdir root
          while read KVER; do
            HEADERS_DEB=$(ls $GITHUB_WORKSPACE/linux-headers-$KVER*.deb | head -n1)
            if [ ! -s "$HEADERS_DEB" ]; then
              echo "❌ Downloaded headers deb not found or empty: $HEADERS_DEB"
              echo "| $HEADERS_DEB | ${{ matrix.arch }} | SKIP | download failed |" >> "$SUMMARY"
              continue
            fi
            rm -rf root
            mkdir root
            if ! dpkg-deb -x "$HEADERS_DEB" root/; then
              echo "❌ Failed to extract $HEADERS_DEB"
              echo "| $HEADERS_DEB | ${{ matrix.arch }} | SKIP | extract failed |" >> "$SUMMARY"
              continue
            fi

            HDRDIR=$(ls root/usr/src | grep -m1 'linux-headers' || true)
            if [ -z "$HDRDIR" ]; then
              echo "❌ No linux-headers directory found after extracting $HEADERS_DEB"
              echo "| $HEADERS_DEB | ${{ matrix.arch }} | SKIP | no headers dir |" >> "$SUMMARY"
              continue
            fi
            KDIR="$GITHUB_WORKSPACE/root/usr/src/$HDRDIR"

            echo "Headers version: $HDRDIR"
            echo "Build dir: $KDIR"

            if make -C "$KDIR" M="$PWD" modules; then
              echo "✅ Build OK"
              RESULT="OK"
              NOTE=""
            else
              echo "❌ Build failed"
              RESULT="FAIL"
              NOTE=""
              FAIL=1
            fi

            echo "| $HDRDIR | ${{ matrix.arch }} | $RESULT | $NOTE |" >> "$SUMMARY"

            if [ "$RESULT" = "OK" ]; then
              OUT="$GITHUB_WORKSPACE/artifacts/${{ matrix.arch }}/$HDRDIR"
              mkdir -p "$OUT"
              cp -v ./*.ko "$OUT/" 2>/dev/null || true
              cp -v ./*.dtbo "$OUT/" 2>/dev/null || true
            fi
          done < kernel_versions.txt

          echo ""
          echo "========== BUILD SUMMARY =========="
          cat "$SUMMARY"
          echo "=================================="
          exit $FAIL

      - name: Detect module name
        if: steps.build.outcome == 'success'
        working-directory: ${{ inputs.module_path }}
        run: |
          if [ ! -f MODULE_NAME ]; then
            echo "MODULE_NAME file not found!" >&2
            exit 1
          fi
          echo "MODULE_NAME=$(cat MODULE_NAME)" >> $GITHUB_ENV

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ko-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/

      - name: Show build summary
        if: always()
        run: |
          echo "::notice file=summary.txt::$(cat $GITHUB_WORKSPACE/summary.txt)"

      - name: Fail with context
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error::❌ One or more builds failed for arch ${{ matrix.arch }}"
          exit 1
