name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      newest_lines_count:
        required: false
        type: number
        default: 1
      dry_run:
        required: false
        type: boolean
        default: false
      release_lines:
        required: false
        type: string
        default: ''
      kernel_versions:
        required: false
        type: string
        default: ''
      build_families:
        required: false
        type: string
        default: 'rpi'
      experimental_channels:
        required: false
        type: string
        default: 'rpi-update-next,rpi-update-main'
      experimental_blocking:
        required: false
        type: boolean
        default: false
      module_path:
        required: false
        type: string
        default: '.'

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          set -e
          echo "Runner host architecture: $(dpkg --print-architecture)"
          sudo apt update
          # Base tools and native compiler
          sudo apt install -y build-essential jq curl xz-utils gnupg gcc-12 device-tree-compiler
          # Keep armhf cross toolchain available for targets inferred as 32-bit ARM.
          sudo apt install -y gcc-12-arm-linux-gnueabihf
          # Some RPi armhf header trees invoke gcc-14 explicitly.
          sudo apt install -y gcc-14-arm-linux-gnueabihf

          # Some kernel Kconfig checks expect an unversioned cross-compiler name.
          if ! command -v arm-linux-gnueabihf-gcc >/dev/null 2>&1; then
            if command -v arm-linux-gnueabihf-gcc-12 >/dev/null 2>&1; then
              sudo ln -sf "$(command -v arm-linux-gnueabihf-gcc-12)" /usr/local/bin/arm-linux-gnueabihf-gcc
            elif command -v arm-linux-gnueabihf-gcc-14 >/dev/null 2>&1; then
              sudo ln -sf "$(command -v arm-linux-gnueabihf-gcc-14)" /usr/local/bin/arm-linux-gnueabihf-gcc
            fi
          fi

      - name: Enable package architectures for apt
        run: |
          set -e
          # Enable both package architectures so target architecture can be inferred from package metadata.
          sudo dpkg --add-architecture arm64
          sudo dpkg --add-architecture armhf
          sudo apt-get update --allow-releaseinfo-change || true
          # Allow execution of armhf host tools (modpost/fixdep) on arm64 runner when needed.
          sudo apt-get install -y libc6:armhf libstdc++6:armhf

      - name: Add Raspberry Pi OS repository and GPG key
        run: |
          set -e
          DISTRO_INFO_URL="https://salsa.debian.org/debian/distro-info-data/-/raw/main/debian.csv"
          TODAY="$(date -u +%F)"
          repo_suite_exists() {
            local suite="$1"
            curl -fsSI "http://archive.raspberrypi.org/debian/dists/$suite/InRelease" >/dev/null \
              || curl -fsSI "http://archive.raspberrypi.org/debian/dists/$suite/Release" >/dev/null
          }

          DISTRO_INFO="$(curl -fsSL "$DISTRO_INFO_URL" || true)"

          STABLE_SUITE=""
          OLDSTABLE_SUITE=""
          NEXT_SUITE=""
          SUITE_SOURCE="debian-distro-info"

          if [ -n "$DISTRO_INFO" ]; then
            STABLE_SUITE="$(printf '%s\n' "$DISTRO_INFO" | awk -F',' -v today="$TODAY" 'NR > 1 && $5 != "" && $5 <= today { if ($5 > max) { max=$5; code=tolower($2) } } END { print code }')"
            OLDSTABLE_SUITE="$(printf '%s\n' "$DISTRO_INFO" | awk -F',' -v today="$TODAY" 'NR > 1 && $5 != "" && $5 <= today { print $5 "," tolower($2) }' | sort -t',' -k1,1 | tail -n2 | head -n1 | cut -d',' -f2)"
            NEXT_SUITE="$(printf '%s\n' "$DISTRO_INFO" | awk -F',' -v today="$TODAY" 'NR > 1 && $5 != "" && $5 > today { if (min == "" || $5 < min) { min=$5; code=tolower($2) } } END { print code }')"
          fi

          if [ -z "$STABLE_SUITE" ]; then
            STABLE_SUITE="trixie"
            SUITE_SOURCE="fallback-trixie"
            echo "::warning::Failed to resolve stable Debian suite from distro-info; falling back to '$STABLE_SUITE'"
          fi

          CANDIDATE_SUITES_RAW="$STABLE_SUITE $OLDSTABLE_SUITE $NEXT_SUITE"
          ENABLED_SUITES=""
          SEEN_SUITES=" "
          for suite in $CANDIDATE_SUITES_RAW; do
            suite="$(echo "$suite" | xargs | tr '[:upper:]' '[:lower:]')"
            [ -z "$suite" ] && continue
            case " $SEEN_SUITES " in
              *" $suite "*)
                continue
                ;;
            esac
            SEEN_SUITES="$SEEN_SUITES$suite "

            if repo_suite_exists "$suite"; then
              ENABLED_SUITES="${ENABLED_SUITES:+$ENABLED_SUITES }$suite"
            else
              echo "::warning::Skipping unavailable Raspberry Pi suite '$suite' (InRelease/Release missing)"
            fi
          done

          if [ -z "$ENABLED_SUITES" ]; then
            echo "::error::No usable Raspberry Pi repository suites were found"
            exit 1
          fi

          echo "Resolved Raspberry Pi suites: $ENABLED_SUITES (stable=$STABLE_SUITE oldstable=${OLDSTABLE_SUITE:-n/a} next=${NEXT_SUITE:-n/a} source=$SUITE_SOURCE)"
          : | sudo tee /etc/apt/sources.list.d/raspi.list >/dev/null
          for suite in $ENABLED_SUITES; do
            echo "deb http://archive.raspberrypi.org/debian/ $suite main" | sudo tee -a /etc/apt/sources.list.d/raspi.list
          done
          curl -fsSL https://archive.raspberrypi.org/debian/raspberrypi.gpg.key | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/raspberrypi.gpg
          sudo apt-get update --allow-releaseinfo-change

      - name: Download kernel headers deb(s) with apt
        id: download_headers
        run: |
          set -e
          EXPLICIT_VERSIONS="${{ inputs.kernel_versions }}"
          EXPLICIT_LINES="${{ inputs.release_lines }}"
          NEWEST_LINES_COUNT="${{ inputs.newest_lines_count }}"
          DRY_RUN="${{ inputs.dry_run }}"
          BUILD_FAMILIES_RAW="${{ inputs.build_families }}"
          HOST_ARCH="$(dpkg --print-architecture)"

          BUILD_FAMILIES="$(echo "$BUILD_FAMILIES_RAW" | tr '[:upper:]' '[:lower:]' | tr ',' ' ')"
          INCLUDE_RPI=0
          INCLUDE_UBUNTU=0
          for family in $BUILD_FAMILIES; do
            family="$(echo "$family" | xargs)"
            [ -z "$family" ] && continue
            case "$family" in
              rpi)
                INCLUDE_RPI=1
                ;;
              ubuntu)
                INCLUDE_UBUNTU=1
                ;;
              *)
                echo "::warning::Ignoring invalid build_families token '$family'"
                ;;
            esac
          done
          if [ "$INCLUDE_RPI" -eq 0 ] && [ "$INCLUDE_UBUNTU" -eq 0 ]; then
            INCLUDE_RPI=1
            echo "::warning::No valid build_families token found; defaulting to rpi"
          fi

          echo "Host architecture: $HOST_ARCH"
          echo "Selection inputs: newest_lines_count=$NEWEST_LINES_COUNT dry_run=$DRY_RUN release_lines='${EXPLICIT_LINES:-}' kernel_versions='${EXPLICIT_VERSIONS:-}'"
          echo "Family selection: include_rpi=$INCLUDE_RPI include_ubuntu=$INCLUDE_UBUNTU"

          rm -f candidates.txt selected_targets.txt kernel_targets.txt

          # Collect candidate header packages from enabled families.
          apt list -a 'linux-headers-*' 2>/dev/null | awk -v include_rpi="$INCLUDE_RPI" -v include_ubuntu="$INCLUDE_UBUNTU" '
            /^linux-headers-[0-9]/ {
              split($1, path, "/")
              pkg=path[1]
              sub(/^linux-headers-/, "", pkg)
              arch=$3
              if (arch !~ /^(arm64|armhf)$/) next
              if (pkg !~ /^[0-9]+\.[0-9]+\.[0-9]+/) next

              family=""
              if (pkg ~ /\+rpt-/) {
                family="rpi"
              } else if (pkg ~ /-raspi$/) {
                family="ubuntu"
              } else {
                next
              }

              if (family == "rpi" && include_rpi != 1) next
              if (family == "ubuntu" && include_ubuntu != 1) next

              # For Ubuntu raspi kernels include ABI in core (e.g. 6.8.0-1053)
              # so "latest core in a line" does not collapse to every historical ABI.
              if (family == "ubuntu") {
                if (match(pkg, /^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+/)) {
                  core=substr(pkg, RSTART, RLENGTH)
                } else if (match(pkg, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                  core=substr(pkg, RSTART, RLENGTH)
                } else {
                  next
                }
              } else {
                if (match(pkg, /^[0-9]+\.[0-9]+\.[0-9]+/)) {
                  core=substr(pkg, RSTART, RLENGTH)
                } else {
                  next
                }
              }
              if (match(core, /^[0-9]+\.[0-9]+/)) {
                line=substr(core, RSTART, RLENGTH)
              } else {
                next
              }
              print pkg "|" arch "|linux-headers-" pkg "|" family "|" core "|" line
            }
          ' | sort -u > candidates.txt

          if [ ! -s candidates.txt ]; then
            REASON="no kernel headers were discovered in apt metadata"
            RPI_SELECTED_COUNT=0
            UBUNTU_SELECTED_COUNT=0
            RPI_BUILD_TARGET_COUNT=0
            UBUNTU_BUILD_TARGET_COUNT=0
            FAMILY_POLICY_FAILED=false
            FAMILY_POLICY_REASON=""
            if [ "$INCLUDE_RPI" -eq 1 ]; then
              FAMILY_POLICY_FAILED=true
              FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}rpi=0"
            fi
            if [ "$INCLUDE_UBUNTU" -eq 1 ]; then
              FAMILY_POLICY_FAILED=true
              FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}ubuntu=0"
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "selected_target_count=0" >> "$GITHUB_OUTPUT"
            echo "selected_rpi_count=$RPI_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "selected_ubuntu_count=$UBUNTU_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_rpi_count=$RPI_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_ubuntu_count=$UBUNTU_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "family_policy_failed=$FAMILY_POLICY_FAILED" >> "$GITHUB_OUTPUT"
            echo "family_policy_reason=$FAMILY_POLICY_REASON" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          add_selection_by_core() {
            local core="$1"
            if [ -n "$core" ]; then
              awk -F'|' -v c="$core" '$5 == c { print }' candidates.txt >> selected_targets.txt
            fi
          }

          : > selected_targets.txt

          if [ -n "$EXPLICIT_VERSIONS" ]; then
            echo "Selection mode: explicit versions"
            TOKENS=$(echo "$EXPLICIT_VERSIONS" | tr ',' ' ')
            for token in $TOKENS; do
              token="$(echo "$token" | xargs)"
              [ -z "$token" ] && continue
              if echo "$token" | grep -Eq '[+-]'; then
                # Full kernel flavor token such as 6.12.75+rpt-rpi-v8.
                awk -F'|' -v t="$token" '$1 == t { print }' candidates.txt >> selected_targets.txt
              elif echo "$token" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                # Explicit core version such as 6.12.75.
                add_selection_by_core "$token"
              else
                echo "::warning::Ignoring invalid kernel_versions token '$token'"
              fi
            done
          elif [ -n "$EXPLICIT_LINES" ]; then
            echo "Selection mode: explicit release lines"
            TOKENS=$(echo "$EXPLICIT_LINES" | tr ',' ' ')
            for line in $TOKENS; do
              line="$(echo "$line" | xargs)"
              [ -z "$line" ] && continue
              latest_core=$(awk -F'|' -v l="$line" '$6 == l { print $5 }' candidates.txt | sort -uV | tail -n 1 || true)
              if [ -z "$latest_core" ]; then
                echo "::warning::No kernel release matched line '$line'"
                continue
              fi
              add_selection_by_core "$latest_core"
            done
          else
            echo "Selection mode: newest release lines"
            LINES=$(awk -F'|' '{ print $6 }' candidates.txt | sort -uV)
            NEWEST_LINES=$(echo "$LINES" | tail -n "$NEWEST_LINES_COUNT")
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              latest_core=$(awk -F'|' -v l="$line" '$6 == l { print $5 }' candidates.txt | sort -uV | tail -n 1 || true)
              [ -z "$latest_core" ] && continue
              add_selection_by_core "$latest_core"
            done <<< "$NEWEST_LINES"
          fi

          sort -u selected_targets.txt -o selected_targets.txt

          if [ ! -s selected_targets.txt ]; then
            echo "::error::Kernel selection produced no targets"
            exit 1
          fi

          SELECTED_TARGET_COUNT="$(wc -l < selected_targets.txt | tr -d ' ')"
          [ -z "$SELECTED_TARGET_COUNT" ] && SELECTED_TARGET_COUNT=0

          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry-run selected kernel targets (kver|arch|pkg|family|core|line):"
            cat selected_targets.txt
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=dry-run mode enabled" >> "$GITHUB_OUTPUT"
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "selected_target_count=$SELECTED_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Selected kernel targets (kver|arch|pkg|family|core|line):"
          cat selected_targets.txt

          RPI_SELECTED_COUNT="$(awk -F'|' '$4 == "rpi" { c++ } END { print c+0 }' selected_targets.txt)"
          UBUNTU_SELECTED_COUNT="$(awk -F'|' '$4 == "ubuntu" { c++ } END { print c+0 }' selected_targets.txt)"
          echo "Selected families: rpi=$RPI_SELECTED_COUNT ubuntu=$UBUNTU_SELECTED_COUNT"

          : > kernel_targets.txt

          while IFS='|' read -r KVER APT_ARCH HEADER_PKG FAMILY CORE LINE; do
            [ -z "$KVER" ] && continue

            if ! apt download "$HEADER_PKG:$APT_ARCH" >/dev/null 2>&1; then
              echo "::warning::Skipping kernel '$KVER': cannot download headers package '$HEADER_PKG:$APT_ARCH'"
              continue
            fi

            if [ "$FAMILY" = "rpi" ]; then
              BASE_RPT=$(echo "$KVER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\+rpt' || true)
              if [ -z "$BASE_RPT" ]; then
                echo "::warning::Skipping kernel '$KVER': failed to derive +rpt base version"
                continue
              fi

              COMMON_PKG="linux-headers-${BASE_RPT}-common-rpi"
              if ! apt download "$COMMON_PKG:$APT_ARCH" >/dev/null 2>&1; then
                if ! apt download "$COMMON_PKG" >/dev/null 2>&1; then
                  echo "::warning::Skipping kernel '$KVER': missing common headers package '$COMMON_PKG'"
                  continue
                fi
              fi

              KBUILD_PKG="linux-kbuild-${BASE_RPT}"
              KBUILD_OK=0
              if [ "$APT_ARCH" = "armhf" ] && [ "$HOST_ARCH" = "arm64" ]; then
                if apt download "$KBUILD_PKG:armhf" >/dev/null 2>&1; then
                  KBUILD_OK=1
                elif apt download "$KBUILD_PKG:$HOST_ARCH" >/dev/null 2>&1; then
                  KBUILD_OK=1
                fi
              else
                if apt download "$KBUILD_PKG:$HOST_ARCH" >/dev/null 2>&1; then
                  KBUILD_OK=1
                fi
              fi
              if [ "$KBUILD_OK" -ne 1 ] && apt download "$KBUILD_PKG" >/dev/null 2>&1; then
                KBUILD_OK=1
              fi
              if [ "$KBUILD_OK" -ne 1 ]; then
                echo "::warning::Skipping kernel '$KVER': missing host kbuild package '$KBUILD_PKG'"
                continue
              fi
            else
              # Ubuntu raspi packages usually use linux-kbuild-<major.minor>.
              KBUILD_PKG="linux-kbuild-${LINE}"
              KBUILD_OK=0
              if [ "$APT_ARCH" = "armhf" ] && [ "$HOST_ARCH" = "arm64" ]; then
                if apt download "$KBUILD_PKG:armhf" >/dev/null 2>&1; then
                  KBUILD_OK=1
                elif apt download "$KBUILD_PKG:$HOST_ARCH" >/dev/null 2>&1; then
                  KBUILD_OK=1
                fi
              else
                if apt download "$KBUILD_PKG:$HOST_ARCH" >/dev/null 2>&1; then
                  KBUILD_OK=1
                fi
              fi
              if [ "$KBUILD_OK" -ne 1 ] && apt download "$KBUILD_PKG" >/dev/null 2>&1; then
                KBUILD_OK=1
              fi
              if [ "$KBUILD_OK" -ne 1 ]; then
                echo "::warning::Skipping kernel '$KVER': host kbuild package '$KBUILD_PKG' not found"
                continue
              fi
            fi

            if ! echo "$KVER|$APT_ARCH|$HEADER_PKG|$FAMILY|$CORE|$LINE" >> kernel_targets.txt; then
              echo "::warning::Skipping kernel '$KVER': failed to add target record"
              continue
            fi
          done < selected_targets.txt

          if [ -s kernel_targets.txt ]; then
            sort -u kernel_targets.txt -o kernel_targets.txt
          fi

          RPI_BUILD_TARGET_COUNT="$(awk -F'|' '$4 == "rpi" { c++ } END { print c+0 }' kernel_targets.txt)"
          UBUNTU_BUILD_TARGET_COUNT="$(awk -F'|' '$4 == "ubuntu" { c++ } END { print c+0 }' kernel_targets.txt)"
          echo "Build-target families: rpi=$RPI_BUILD_TARGET_COUNT ubuntu=$UBUNTU_BUILD_TARGET_COUNT"

          FAMILY_POLICY_FAILED=false
          FAMILY_POLICY_REASON=""
          if [ "$INCLUDE_RPI" -eq 1 ] && [ "$RPI_BUILD_TARGET_COUNT" -eq 0 ]; then
            FAMILY_POLICY_FAILED=true
            FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}rpi=0"
          fi
          if [ "$INCLUDE_UBUNTU" -eq 1 ] && [ "$UBUNTU_BUILD_TARGET_COUNT" -eq 0 ]; then
            FAMILY_POLICY_FAILED=true
            FAMILY_POLICY_REASON="${FAMILY_POLICY_REASON:+$FAMILY_POLICY_REASON,}ubuntu=0"
          fi

          if [ ! -s kernel_targets.txt ]; then
            REASON="no kernels passed package download checks"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$REASON" >> "$GITHUB_OUTPUT"
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "selected_target_count=$SELECTED_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "selected_rpi_count=$RPI_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "selected_ubuntu_count=$UBUNTU_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_rpi_count=$RPI_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "build_target_ubuntu_count=$UBUNTU_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
            echo "family_policy_failed=$FAMILY_POLICY_FAILED" >> "$GITHUB_OUTPUT"
            echo "family_policy_reason=$FAMILY_POLICY_REASON" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Selected build targets (kver|arch|pkg|family|core|line):"
          cat kernel_targets.txt

          echo "== Downloaded .deb files =="
          ls -lh "$GITHUB_WORKSPACE"/*.deb || echo "No debs found"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "skip_reason=" >> "$GITHUB_OUTPUT"
          echo "dry_run=false" >> "$GITHUB_OUTPUT"
          echo "selected_target_count=$SELECTED_TARGET_COUNT" >> "$GITHUB_OUTPUT"
          echo "selected_rpi_count=$RPI_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
          echo "selected_ubuntu_count=$UBUNTU_SELECTED_COUNT" >> "$GITHUB_OUTPUT"
          echo "build_target_rpi_count=$RPI_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
          echo "build_target_ubuntu_count=$UBUNTU_BUILD_TARGET_COUNT" >> "$GITHUB_OUTPUT"
          echo "family_policy_failed=$FAMILY_POLICY_FAILED" >> "$GITHUB_OUTPUT"
          echo "family_policy_reason=$FAMILY_POLICY_REASON" >> "$GITHUB_OUTPUT"

      - name: Discover experimental channel targets
        id: discover_experimental
        run: |
          set -euo pipefail

          CHANNELS_RAW="${{ inputs.experimental_channels }}"
          TARGET_FILE="$GITHUB_WORKSPACE/experimental_targets.txt"
          : > "$TARGET_FILE"

          NORMALIZED_CHANNELS="$(echo "$CHANNELS_RAW" | tr '[:upper:]' '[:lower:]' | tr ',' ' ')"
          SEEN=" "
          COUNT=0

          map_channel_branch() {
            case "$1" in
              rpi-update-next)
                echo "next"
                ;;
              rpi-update-main)
                echo "master"
                ;;
              *)
                echo ""
                ;;
            esac
          }

          discover_channel_targets() {
            local channel="$1"
            local fw_branch="$2"
            local tree_json
            local linux_hash
            local all_kvers
            local newest_core

            infer_experimental_target() {
              local kver="$1"
              local apt_arch=""
              local karch=""
              local cross=""
              local defconfig=""

              case "$kver" in
                *-v6+)
                  apt_arch="armhf"
                  karch="arm"
                  cross="arm-linux-gnueabihf-"
                  defconfig="bcmrpi_defconfig"
                  ;;
                *-v7+|*-v7l+)
                  apt_arch="armhf"
                  karch="arm"
                  cross="arm-linux-gnueabihf-"
                  defconfig="bcm2709_defconfig"
                  ;;
                *-2712+)
                  apt_arch="arm64"
                  karch="arm64"
                  cross=""
                  defconfig="bcm2712_defconfig"
                  ;;
                *-v8+|*-v8-rt+|*-v8-16k+)
                  apt_arch="arm64"
                  karch="arm64"
                  cross=""
                  defconfig="bcm2711_defconfig"
                  ;;
                *)
                  ;;
              esac

              if [ -z "$apt_arch" ] || [ -z "$karch" ] || [ -z "$defconfig" ]; then
                return 1
              fi

              echo "$apt_arch|$karch|$cross|$defconfig"
            }

            tree_json="$(curl -fsSL "https://api.github.com/repos/raspberrypi/firmware/git/trees/${fw_branch}?recursive=1" || true)"
            if [ -z "$tree_json" ]; then
              echo "::warning::Experimental channel '$channel' skipped: failed to query firmware tree"
              return
            fi

            linux_hash="$(curl -fsSL "https://raw.githubusercontent.com/raspberrypi/firmware/${fw_branch}/extra/git_hash" 2>/dev/null | tr -d '[:space:]' || true)"
            if ! echo "$linux_hash" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::warning::Experimental channel '$channel' skipped: invalid linux git hash metadata"
              return
            fi

            all_kvers="$(printf '%s\n' "$tree_json" | jq -r '.tree[].path' | sed -n 's#^modules/\([^/]*\)/.*#\1#p' | sort -uV)"
            newest_core="$(printf '%s\n' "$all_kvers" | sed -n 's#^\([0-9]\+\.[0-9]\+\.[0-9]\+\).*$#\1#p' | sort -uV | tail -n1 || true)"

            if [ -z "$newest_core" ]; then
              echo "::warning::Experimental channel '$channel' skipped: no usable module target versions discovered"
              return
            fi

            ADDED=0
            while IFS= read -r kver; do
              [ -z "$kver" ] && continue
              case "$kver" in
                "$newest_core"*)
                  TARGET_META="$(infer_experimental_target "$kver" || true)"
                  if [ -z "$TARGET_META" ]; then
                    echo "::warning::Experimental channel '$channel': skipping unsupported kernel flavor '$kver'"
                    continue
                  fi
                  IFS='|' read -r APT_ARCH KARCH CROSS_COMPILE DEFCONFIG <<< "$TARGET_META"
                  echo "$channel|$kver|$APT_ARCH|$KARCH|$CROSS_COMPILE|$linux_hash|$DEFCONFIG" >> "$TARGET_FILE"
                  ADDED=$((ADDED + 1))
                  ;;
              esac
            done <<< "$all_kvers"

            if [ "$ADDED" -eq 0 ]; then
              echo "::warning::Experimental channel '$channel' skipped: no mappable flavors for newest core '$newest_core'"
              return
            fi

            echo "Discovered experimental channel '$channel': newest_core='$newest_core' flavors=$ADDED"
          }

          for token in $NORMALIZED_CHANNELS; do
            token="$(echo "$token" | xargs)"
            [ -z "$token" ] && continue

            case " $SEEN " in
              *" $token "*)
                continue
                ;;
            esac
            SEEN="$SEEN$token "

            fw_branch="$(map_channel_branch "$token")"
            if [ -z "$fw_branch" ]; then
              echo "::warning::Ignoring invalid experimental_channels token '$token'"
              continue
            fi

            discover_channel_targets "$token" "$fw_branch"
          done

          if [ -s "$TARGET_FILE" ]; then
            sort -u "$TARGET_FILE" -o "$TARGET_FILE"
            COUNT="$(wc -l < "$TARGET_FILE" | tr -d ' ')"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
            echo "target_count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "Experimental targets (channel|kver|apt_arch|arch|cross|linux_hash|defconfig):"
            cat "$TARGET_FILE"
          else
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
            echo "target_count=0" >> "$GITHUB_OUTPUT"
            echo "No experimental channel targets discovered"
          fi

      - name: Build against kernels
        id: build
        if: steps.download_headers.outputs.skip != 'true' || steps.discover_experimental.outputs.has_targets == 'true'
        working-directory: ${{ inputs.module_path }}
        continue-on-error: true
        run: |
          set -euo pipefail

          FAIL=0
          HOST_ARCH="$(dpkg --print-architecture)"
          echo "Runner host architecture in build step: $HOST_ARCH"
          OKS=0
          FAILS=0
          SKIPS=0
          TARGETS=0
          OK_KERNELS=""
          FAIL_KERNELS=""
          SKIP_KERNELS=""
          EXP_BLOCKING="${{ inputs.experimental_blocking }}"
          EXP_OKS=0
          EXP_FAILS=0
          EXP_SKIPS=0
          EXP_TARGETS=0
          EXP_OK_KERNELS=""
          EXP_FAIL_KERNELS=""
          EXP_SKIP_KERNELS=""
          ARTIFACT_ROOT="${RUNNER_TEMP}/kmod-artifacts"

          escape_annotation() {
            sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e ':a;N;$!ba;s/\n/%0A/g'
          }

          extract_make_error_snippet() {
            local log_file="$1"
            awk '
              { lines[NR]=$0 }
              /: error: / && first == 0 { first=NR }
              END {
                if (first == 0) {
                  exit
                }
                start=first
                for (i=first-1; i>=1 && i>=first-3; i--) {
                  if (lines[i] ~ /: In function /) {
                    start=i
                    break
                  }
                }
                end=first+4
                for (i=start; i<=end && i<=NR; i++) {
                  print lines[i]
                }
              }
            ' "$log_file"
          }

          extract_command_failure_snippet() {
            local log_file="$1"
            awk '
              { lines[NR]=$0 }
              /(error:|undefined reference|No rule to make target|No such file or directory|failed|ERROR)/ && first == 0 { first=NR }
              END {
                if (NR == 0) {
                  exit
                }
                if (first > 0) {
                  start=first-2
                  if (start < 1) {
                    start=1
                  }
                  end=first+6
                  if (end > NR) {
                    end=NR
                  }
                } else {
                  start=NR-19
                  if (start < 1) {
                    start=1
                  }
                  end=NR
                }
                for (i=start; i<=end; i++) {
                  print lines[i]
                }
              }
            ' "$log_file"
          }

          resolve_compiler_bin() {
            local cross_prefix="$1"
            local cc_bin=""

            if [ -n "$cross_prefix" ]; then
              if command -v "${cross_prefix}gcc-12" >/dev/null 2>&1; then
                cc_bin="${cross_prefix}gcc-12"
              elif command -v "${cross_prefix}gcc" >/dev/null 2>&1; then
                cc_bin="${cross_prefix}gcc"
              elif command -v "${cross_prefix}gcc-14" >/dev/null 2>&1; then
                cc_bin="${cross_prefix}gcc-14"
              fi
            else
              if command -v gcc-12 >/dev/null 2>&1; then
                cc_bin="gcc-12"
              elif command -v gcc >/dev/null 2>&1; then
                cc_bin="gcc"
              fi
            fi

            printf '%s\n' "$cc_bin"
          }

          experimental_defconfig_candidates() {
            local karch="$1"
            local inferred="$2"

            case "$karch" in
              arm)
                printf '%s\n' "$inferred" bcm2709_defconfig bcmrpi_defconfig multi_v7_defconfig
                ;;
              arm64)
                printf '%s\n' "$inferred" bcm2711_defconfig bcm2712_defconfig defconfig
                ;;
              *)
                printf '%s\n' "$inferred"
                ;;
            esac | awk 'NF > 0 && !seen[$0]++'
          }

          # Stage artifacts outside the module tree to avoid accidental cleanup by local make targets.
          rm -rf "$ARTIFACT_ROOT"
          mkdir -p "$ARTIFACT_ROOT"

          # Clean up and create extraction root ONCE per build
          rm -rf root
          mkdir root

          if [ -s "$GITHUB_WORKSPACE/kernel_targets.txt" ]; then
          while IFS='|' read -r KVER APT_ARCH HEADER_PKG FAMILY CORE LINE; do
            [ -z "$KVER" ] && continue
            TARGETS=$((TARGETS + 1))

            HEADERS_DEB=$(ls "$GITHUB_WORKSPACE"/${HEADER_PKG}_*.deb | grep -E "_${APT_ARCH}\.deb$" | head -n1 || true)
            if [ -z "$HEADERS_DEB" ] || [ ! -s "$HEADERS_DEB" ]; then
              echo "::warning::Skipping kernel $KVER: missing downloaded headers deb"
              SKIPS=$((SKIPS + 1))
              SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
              continue
            fi

            COMMON_DEB=""
            BASE_RPT=""
            if [ "$FAMILY" = "rpi" ]; then
              BASE_RPT=$(echo "$KVER" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\+rpt' || true)
              COMMON_DEB=$(ls "$GITHUB_WORKSPACE"/linux-headers-${BASE_RPT}-common-rpi*.deb | grep -E "_(${APT_ARCH}|all)\.deb$" | head -n1 || true)
              if [ -z "$COMMON_DEB" ] || [ ! -s "$COMMON_DEB" ]; then
                echo "::warning::Skipping kernel $KVER: missing common headers deb"
                SKIPS=$((SKIPS + 1))
                SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
                continue
              fi
            fi

            KBUILD_DEB=""
            if [ "$FAMILY" = "rpi" ] && [ -n "$BASE_RPT" ]; then
              if [ "$APT_ARCH" = "armhf" ] && [ "$HOST_ARCH" = "arm64" ]; then
                for karch in armhf "$HOST_ARCH" all; do
                  KBUILD_DEB=$(ls "$GITHUB_WORKSPACE"/linux-kbuild-${BASE_RPT}*.deb | grep -E "_${karch}\.deb$" | head -n1 || true)
                  [ -n "$KBUILD_DEB" ] && break
                done
              else
                KBUILD_DEB=$(ls "$GITHUB_WORKSPACE"/linux-kbuild-${BASE_RPT}*.deb | grep -E "_(${HOST_ARCH}|all)\.deb$" | head -n1 || true)
              fi
            else
              if [ "$APT_ARCH" = "armhf" ] && [ "$HOST_ARCH" = "arm64" ]; then
                for karch in armhf "$HOST_ARCH" all; do
                  KBUILD_DEB=$(ls "$GITHUB_WORKSPACE"/linux-kbuild-${LINE}*.deb | grep -E "_${karch}\.deb$" | head -n1 || true)
                  [ -n "$KBUILD_DEB" ] && break
                done
              else
                KBUILD_DEB=$(ls "$GITHUB_WORKSPACE"/linux-kbuild-${LINE}*.deb | grep -E "_(${HOST_ARCH}|all)\.deb$" | head -n1 || true)
              fi
            fi
            if [ -z "$KBUILD_DEB" ] || [ ! -s "$KBUILD_DEB" ]; then
              echo "::warning::Skipping kernel $KVER: missing host kbuild deb"
              SKIPS=$((SKIPS + 1))
              SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
              continue
            fi

            echo "Preparing to extract: $HEADERS_DEB ${COMMON_DEB:-<none>} $KBUILD_DEB"

            KBUILD_DEB_ARCH="$(dpkg-deb -f "$KBUILD_DEB" Architecture || true)"
            echo "Selected kbuild deb architecture: ${KBUILD_DEB_ARCH:-unknown} (host: $HOST_ARCH)"
            if [ "$KBUILD_DEB_ARCH" != "$HOST_ARCH" ] && [ "$KBUILD_DEB_ARCH" != "all" ] \
              && ! { [ "$HOST_ARCH" = "arm64" ] && [ "$KBUILD_DEB_ARCH" = "armhf" ]; }; then
              echo "::error::Kernel $KVER failed: kbuild package architecture does not match host"
              FAIL=1
              FAILS=$((FAILS + 1))
              FAIL_KERNELS="${FAIL_KERNELS:+$FAIL_KERNELS,}$KVER"
              continue
            fi

            rm -rf root
            mkdir root
            if ! dpkg-deb -x "$HEADERS_DEB" root/; then
              echo "::warning::Skipping kernel $KVER: failed to extract headers"
              SKIPS=$((SKIPS + 1))
              SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
              continue
            fi
            if [ -n "$COMMON_DEB" ] && ! dpkg-deb -x "$COMMON_DEB" root/; then
              echo "::warning::Skipping kernel $KVER: failed to extract common headers"
              SKIPS=$((SKIPS + 1))
              SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
              continue
            fi
            if ! dpkg-deb -x "$KBUILD_DEB" root/; then
              echo "::warning::Skipping kernel $KVER: failed to extract kbuild"
              SKIPS=$((SKIPS + 1))
              SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
              continue
            fi

            echo "== Package architecture metadata =="
            dpkg-deb -f "$HEADERS_DEB" Package Version Architecture || true
            [ -n "$COMMON_DEB" ] && dpkg-deb -f "$COMMON_DEB" Package Version Architecture || true
            dpkg-deb -f "$KBUILD_DEB" Package Version Architecture || true
            echo "== After extraction, /usr/src contains =="
            ls -lh root/usr/src || true
            echo "== Disk usage of extracted headers =="
            du -sh root/usr/src/* || true

            echo "== Extracted /usr/src contents =="
            ls -l root/usr/src || true
            echo "== Find Makefile under root/ =="
            find root/ -name Makefile || true
            echo "== Host/target info =="
            uname -m || true
            dpkg --print-architecture || true

            # Infer kernel architecture from package metadata.
            case "$APT_ARCH" in
              arm64)
                if [ "$HOST_ARCH" = "arm64" ]; then
                  CROSS_COMPILE=""
                else
                  CROSS_COMPILE="aarch64-linux-gnu-"
                fi
                KARCH="arm64"
                ;;
              armhf)
                CROSS_COMPILE="arm-linux-gnueabihf-"
                KARCH="arm"
                ;;
              *)
                echo "::warning::Skipping kernel $KVER: unsupported inferred package architecture '$APT_ARCH'"
                SKIPS=$((SKIPS + 1))
                SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
                continue
                ;;
            esac

            # Always use the arch/flavor-specific headers directory for building
            HDRDIR=""
            if [ -d "root/usr/src/$HEADER_PKG" ]; then
              HDRDIR="$HEADER_PKG"
            else
              HDRDIR=$(ls root/usr/src | grep "linux-headers-$KVER" | head -n1 || true)
            fi
            if [ -z "$HDRDIR" ]; then
              echo "::warning::Skipping kernel $KVER: specific headers directory missing"
              SKIPS=$((SKIPS + 1))
              SKIP_KERNELS="${SKIP_KERNELS:+$SKIP_KERNELS,}$KVER"
              continue
            fi
            KDIR="$GITHUB_WORKSPACE/root/usr/src/$HDRDIR"

            echo "Headers version: $HDRDIR"
            echo "Build dir: $KDIR"

            # Symlink /usr/src to extracted headers so Makefile references work.
            # This helps with header scripts that assume /usr/src paths.
            sudo rm -rf /usr/src
            sudo ln -s "$GITHUB_WORKSPACE/root/usr/src" /usr/src

            # Mimic local user flow while binding to selected downloaded headers.
            # Local make uses KVER -> /lib/modules/<KVER>/build, so wire that path explicitly.
            echo "Binding /lib/modules/$KVER/build -> $KDIR"
            sudo mkdir -p "/lib/modules/$KVER"
            sudo rm -rf "/lib/modules/$KVER/build"
            sudo ln -s "$KDIR" "/lib/modules/$KVER/build"

            echo "== Kbuild tools/debug =="
            FIXDEP_PATH=$(find root -path '*/scripts/basic/fixdep' | head -n1 || true)
            if [ -n "$FIXDEP_PATH" ]; then
              ls -l "$FIXDEP_PATH" || true
              file "$FIXDEP_PATH" || true
            else
              echo "fixdep path not found under extracted tree"
            fi

            if [ -n "$CROSS_COMPILE" ]; then
              CC_BIN="${CROSS_COMPILE}gcc-12"
            else
              CC_BIN="gcc-12"
            fi
            echo "Selected compiler binary: $CC_BIN"
            if ! command -v "$CC_BIN" >/dev/null 2>&1; then
              echo "::error::Kernel $KVER failed: compiler not found ($CC_BIN)"
              FAIL=1
              FAILS=$((FAILS + 1))
              FAIL_KERNELS="${FAIL_KERNELS:+$FAIL_KERNELS,}$KVER"
              continue
            fi
            "$CC_BIN" --version || true

            echo "Running local-style build commands from module directory"
            echo "Command: make clean"
            echo "Command: make"

            # Export architecture/toolchain variables so local make path remains explicit and debuggable.
            export ARCH="$KARCH"
            export CROSS_COMPILE="$CROSS_COMPILE"
            export CC="$CC_BIN"
            export KVER="$KVER"
            KO_COUNT=0
            DTBO_COUNT=0

            # Keep clean non-fatal: first build on a fresh checkout may not have artifacts to clean.
            make clean || true

            if make; then
              KO_COUNT="$(find . -maxdepth 1 -type f -name '*.ko' | wc -l | tr -d ' ')"
              DTBO_COUNT="$(find . -maxdepth 1 -type f -name '*.dtbo' | wc -l | tr -d ' ')"
              echo "Produced artifacts count: ko=$KO_COUNT dtbo=$DTBO_COUNT"

              # Strict contract: both outputs are expected from local make flow.
              if [ "$KO_COUNT" -eq 0 ] || [ "$DTBO_COUNT" -eq 0 ]; then
                echo "::error::Kernel $KVER failed: expected .ko and .dtbo outputs are required"
                FAIL=1
                FAILS=$((FAILS + 1))
                FAIL_KERNELS="${FAIL_KERNELS:+$FAIL_KERNELS,}$KVER"
              else
                echo "::notice::Kernel $KVER succeeded"
                OKS=$((OKS + 1))
                OK_KERNELS="${OK_KERNELS:+$OK_KERNELS,}$KVER"
              fi
            else
              echo "::error::Kernel $KVER failed: make returned non-zero"
              FAIL=1
              FAILS=$((FAILS + 1))
              FAIL_KERNELS="${FAIL_KERNELS:+$FAIL_KERNELS,}$KVER"
            fi

            if [ "$KO_COUNT" -gt 0 ] && [ "$DTBO_COUNT" -gt 0 ]; then
              OUT="$ARTIFACT_ROOT/$APT_ARCH/module-artifacts-$KVER"
              mkdir -p "$OUT"
              find . -maxdepth 1 -type f -name '*.ko' -print -exec cp -v {} "$OUT/" \;
              find . -maxdepth 1 -type f -name '*.dtbo' -print -exec cp -v {} "$OUT/" \;
            fi
          done < "$GITHUB_WORKSPACE/kernel_targets.txt"
          else
            echo "No apt-derived kernel targets to build"
          fi

          if [ -s "$GITHUB_WORKSPACE/experimental_targets.txt" ]; then
            mkdir -p "$RUNNER_TEMP/experimental-linux"
            while IFS='|' read -r CHANNEL KVER APT_ARCH KARCH CROSS_COMPILE LINUX_HASH DEFCONFIG; do
              [ -z "$KVER" ] && continue
              EXP_TARGETS=$((EXP_TARGETS + 1))

              SRC_DIR="$RUNNER_TEMP/experimental-linux/${CHANNEL}-${LINUX_HASH}"
              if [ ! -d "$SRC_DIR/.git" ]; then
                rm -rf "$SRC_DIR"
                mkdir -p "$SRC_DIR"
                git init "$SRC_DIR"
                git -C "$SRC_DIR" remote add origin https://github.com/raspberrypi/linux.git
                if ! git -C "$SRC_DIR" fetch --depth 1 origin "$LINUX_HASH"; then
                  echo "::warning::Skipping experimental kernel $KVER ($CHANNEL): failed to fetch linux source $LINUX_HASH"
                  EXP_SKIPS=$((EXP_SKIPS + 1))
                  EXP_SKIP_KERNELS="${EXP_SKIP_KERNELS:+$EXP_SKIP_KERNELS,}$CHANNEL:$KVER"
                  continue
                fi
                git -C "$SRC_DIR" checkout -q FETCH_HEAD
              fi

              PREP_STAMP="$SRC_DIR/.prepared-${KARCH}-${DEFCONFIG}"
              if [ ! -f "$PREP_STAMP" ]; then
                DEFCONFIG_TRIED=""
                DEFCONFIG_MISSING=""
                APPLIED_DEFCONFIG=""
                DEFCONFIG_FAILURE_SNIPPET=""
                DEFCONFIG_LOG="$RUNNER_TEMP/experimental-defconfig-${CHANNEL}-${KVER}.log"
                MODULES_PREP_LOG="$RUNNER_TEMP/experimental-modules-prepare-${CHANNEL}-${KVER}.log"
                EXP_CC_BIN="$(resolve_compiler_bin "$CROSS_COMPILE")"

                while IFS= read -r DEFCONFIG_CANDIDATE; do
                  [ -z "$DEFCONFIG_CANDIDATE" ] && continue
                  DEFCONFIG_TRIED="${DEFCONFIG_TRIED:+$DEFCONFIG_TRIED,}$DEFCONFIG_CANDIDATE"
                  DEFCONFIG_PATH="$SRC_DIR/arch/$KARCH/configs/$DEFCONFIG_CANDIDATE"
                  if [ ! -f "$DEFCONFIG_PATH" ]; then
                    DEFCONFIG_MISSING="${DEFCONFIG_MISSING:+$DEFCONFIG_MISSING,}$DEFCONFIG_CANDIDATE"
                    continue
                  fi

                  echo "Applying experimental defconfig candidate '$DEFCONFIG_CANDIDATE' for $KVER ($CHANNEL)"
                  rm -f "$DEFCONFIG_LOG"
                  if make -C "$SRC_DIR" ARCH="$KARCH" CROSS_COMPILE="$CROSS_COMPILE" CC="$EXP_CC_BIN" "$DEFCONFIG_CANDIDATE" 2>&1 | tee "$DEFCONFIG_LOG"; then
                    APPLIED_DEFCONFIG="$DEFCONFIG_CANDIDATE"
                    break
                  fi

                  DEFCONFIG_FAILURE_SNIPPET="$(extract_command_failure_snippet "$DEFCONFIG_LOG")"
                done <<< "$(experimental_defconfig_candidates "$KARCH" "$DEFCONFIG")"

                if [ -z "$APPLIED_DEFCONFIG" ]; then
                  if [ -n "$DEFCONFIG_MISSING" ]; then
                    echo "::warning::Experimental kernel $KVER ($CHANNEL): missing defconfig file(s) among attempted candidates: $DEFCONFIG_MISSING"
                  fi

                  if [ -n "$DEFCONFIG_FAILURE_SNIPPET" ]; then
                    DEFCONFIG_ERR_ANNOTATION="$(printf '%s' "$DEFCONFIG_FAILURE_SNIPPET" | escape_annotation)"
                    echo "::warning::Skipping experimental kernel $KVER ($CHANNEL): failed to apply inferred defconfig '$DEFCONFIG' (attempted: $DEFCONFIG_TRIED); reason:%0A$DEFCONFIG_ERR_ANNOTATION"
                  else
                    echo "::warning::Skipping experimental kernel $KVER ($CHANNEL): failed to apply inferred defconfig '$DEFCONFIG' (attempted: $DEFCONFIG_TRIED)"
                  fi
                  EXP_SKIPS=$((EXP_SKIPS + 1))
                  EXP_SKIP_KERNELS="${EXP_SKIP_KERNELS:+$EXP_SKIP_KERNELS,}$CHANNEL:$KVER"
                  continue
                fi

                if [ "$APPLIED_DEFCONFIG" != "$DEFCONFIG" ]; then
                  echo "::warning::Experimental kernel $KVER ($CHANNEL): inferred defconfig '$DEFCONFIG' failed; fallback '$APPLIED_DEFCONFIG' applied"
                fi

                rm -f "$MODULES_PREP_LOG"
                if ! make -C "$SRC_DIR" ARCH="$KARCH" CROSS_COMPILE="$CROSS_COMPILE" CC="$EXP_CC_BIN" modules_prepare 2>&1 | tee "$MODULES_PREP_LOG"; then
                  MODULES_PREP_SNIPPET="$(extract_command_failure_snippet "$MODULES_PREP_LOG")"
                  if [ -n "$MODULES_PREP_SNIPPET" ]; then
                    MODULES_PREP_ANNOTATION="$(printf '%s' "$MODULES_PREP_SNIPPET" | escape_annotation)"
                    echo "::warning::Skipping experimental kernel $KVER ($CHANNEL): modules_prepare failed after '$APPLIED_DEFCONFIG'; reason:%0A$MODULES_PREP_ANNOTATION"
                  else
                    echo "::warning::Skipping experimental kernel $KVER ($CHANNEL): modules_prepare failed after '$APPLIED_DEFCONFIG'"
                  fi
                  EXP_SKIPS=$((EXP_SKIPS + 1))
                  EXP_SKIP_KERNELS="${EXP_SKIP_KERNELS:+$EXP_SKIP_KERNELS,}$CHANNEL:$KVER"
                  continue
                fi
                touch "$PREP_STAMP"
              fi

              CC_BIN="$(resolve_compiler_bin "$CROSS_COMPILE")"
              if ! command -v "$CC_BIN" >/dev/null 2>&1; then
                echo "::warning::Skipping experimental kernel $KVER ($CHANNEL): compiler not found ($CC_BIN)"
                EXP_SKIPS=$((EXP_SKIPS + 1))
                EXP_SKIP_KERNELS="${EXP_SKIP_KERNELS:+$EXP_SKIP_KERNELS,}$CHANNEL:$KVER"
                continue
              fi

              sudo mkdir -p "/lib/modules/$KVER"
              sudo rm -rf "/lib/modules/$KVER/build"
              sudo ln -s "$SRC_DIR" "/lib/modules/$KVER/build"

              export ARCH="$KARCH"
              export CROSS_COMPILE="$CROSS_COMPILE"
              export CC="$CC_BIN"
              export KVER="$KVER"

              KO_COUNT=0
              DTBO_COUNT=0
              make clean || true
              MAKE_LOG="$RUNNER_TEMP/experimental-make-${CHANNEL}-${KVER}.log"
              rm -f "$MAKE_LOG"
              if make 2>&1 | tee "$MAKE_LOG"; then
                KO_COUNT="$(find . -maxdepth 1 -type f -name '*.ko' | wc -l | tr -d ' ')"
                DTBO_COUNT="$(find . -maxdepth 1 -type f -name '*.dtbo' | wc -l | tr -d ' ')"
                if [ "$KO_COUNT" -eq 0 ] || [ "$DTBO_COUNT" -eq 0 ]; then
                  echo "::error::Kernel $KVER ($CHANNEL) failed: expected .ko and .dtbo outputs are required"
                  EXP_FAILS=$((EXP_FAILS + 1))
                  EXP_FAIL_KERNELS="${EXP_FAIL_KERNELS:+$EXP_FAIL_KERNELS,}$CHANNEL:$KVER"
                  if [ "$EXP_BLOCKING" = "true" ]; then
                    FAIL=1
                  fi
                else
                  echo "::notice::Kernel $KVER ($CHANNEL) succeeded"
                  EXP_OKS=$((EXP_OKS + 1))
                  EXP_OK_KERNELS="${EXP_OK_KERNELS:+$EXP_OK_KERNELS,}$CHANNEL:$KVER"
                fi
              else
                ERR_SNIPPET="$(extract_make_error_snippet "$MAKE_LOG")"
                if [ -n "$ERR_SNIPPET" ]; then
                  ERR_ANNOTATION="$(printf '%s' "$ERR_SNIPPET" | escape_annotation)"
                  echo "::error::Kernel $KVER ($CHANNEL) failed: make returned non-zero; relevant error:%0A$ERR_ANNOTATION"
                else
                  echo "::error::Kernel $KVER ($CHANNEL) failed: make returned non-zero"
                fi
                EXP_FAILS=$((EXP_FAILS + 1))
                EXP_FAIL_KERNELS="${EXP_FAIL_KERNELS:+$EXP_FAIL_KERNELS,}$CHANNEL:$KVER"
                if [ "$EXP_BLOCKING" = "true" ]; then
                  FAIL=1
                fi
              fi

              if [ "$KO_COUNT" -gt 0 ] && [ "$DTBO_COUNT" -gt 0 ]; then
                OUT="$ARTIFACT_ROOT/experimental/$CHANNEL/$APT_ARCH/module-artifacts-$KVER"
                mkdir -p "$OUT"
                find . -maxdepth 1 -type f -name '*.ko' -print -exec cp -v {} "$OUT/" \;
                find . -maxdepth 1 -type f -name '*.dtbo' -print -exec cp -v {} "$OUT/" \;
              fi
            done < "$GITHUB_WORKSPACE/experimental_targets.txt"
          else
            echo "No experimental channel targets to build"
          fi

          echo "== Staged artifact files =="
          find "$ARTIFACT_ROOT" -type f | sort || true
          STAGED_ARTIFACT_COUNT="$(find "$ARTIFACT_ROOT" -type f | wc -l | tr -d ' ')"
          [ -z "$STAGED_ARTIFACT_COUNT" ] && STAGED_ARTIFACT_COUNT=0
          echo "Staged artifact file count: $STAGED_ARTIFACT_COUNT"

          echo "Stable builds: total=$((OKS+FAILS+SKIPS)) ok=$OKS skip=$SKIPS fail=$FAILS"
          echo "Experimental builds: total=$((EXP_OKS+EXP_FAILS+EXP_SKIPS)) ok=$EXP_OKS skip=$EXP_SKIPS fail=$EXP_FAILS"
          echo "target_count=$((TARGETS + EXP_TARGETS))" >> "$GITHUB_OUTPUT"
          echo "ok_count=$OKS" >> "$GITHUB_OUTPUT"
          echo "skip_count=$SKIPS" >> "$GITHUB_OUTPUT"
          echo "fail_count=$FAILS" >> "$GITHUB_OUTPUT"
          echo "ok_kernels=$OK_KERNELS" >> "$GITHUB_OUTPUT"
          echo "fail_kernels=$FAIL_KERNELS" >> "$GITHUB_OUTPUT"
          echo "skip_kernels=$SKIP_KERNELS" >> "$GITHUB_OUTPUT"
          echo "exp_target_count=$EXP_TARGETS" >> "$GITHUB_OUTPUT"
          echo "exp_ok_count=$EXP_OKS" >> "$GITHUB_OUTPUT"
          echo "exp_skip_count=$EXP_SKIPS" >> "$GITHUB_OUTPUT"
          echo "exp_fail_count=$EXP_FAILS" >> "$GITHUB_OUTPUT"
          echo "exp_ok_kernels=$EXP_OK_KERNELS" >> "$GITHUB_OUTPUT"
          echo "exp_fail_kernels=$EXP_FAIL_KERNELS" >> "$GITHUB_OUTPUT"
          echo "exp_skip_kernels=$EXP_SKIP_KERNELS" >> "$GITHUB_OUTPUT"
          exit $FAIL

      - name: Upload artifacts
        if: always() && steps.build.outcome != 'skipped'
        uses: actions/upload-artifact@v6
        with:
          name: kmod-artifacts
          path: ${{ runner.temp }}/kmod-artifacts/

      - name: Show final status
        if: always()
        run: |
          if [ "${{ steps.download_headers.outcome }}" = "failure" ]; then
            echo "::error::FAIL: kernel selection/header preparation failed"
            exit 1
          fi

          if [ "${{ steps.download_headers.outputs.dry_run }}" = "true" ]; then
            SELECTED="${{ steps.download_headers.outputs.selected_target_count }}"
            [ -z "$SELECTED" ] && SELECTED=0
            echo "::notice::DRY-RUN: selected_targets=$SELECTED"
            exit 0
          fi

          HAS_EXPERIMENTAL="${{ steps.discover_experimental.outputs.has_targets }}"
          EXP_BLOCKING="${{ inputs.experimental_blocking }}"

          if [ "${{ steps.download_headers.outputs.skip }}" = "true" ] && [ "$HAS_EXPERIMENTAL" != "true" ]; then
            if [ "${{ steps.download_headers.outputs.family_policy_failed }}" = "true" ]; then
              echo "::error::FAIL: family policy violation (required families missing): ${{ steps.download_headers.outputs.family_policy_reason }} selected[rpi=${{ steps.download_headers.outputs.selected_rpi_count }},ubuntu=${{ steps.download_headers.outputs.selected_ubuntu_count }}] build_targets[rpi=${{ steps.download_headers.outputs.build_target_rpi_count }},ubuntu=${{ steps.download_headers.outputs.build_target_ubuntu_count }}]"
              exit 1
            fi
            echo "::warning::SKIP: ${{ steps.download_headers.outputs.skip_reason }}"
            exit 0
          fi

          if [ "${{ steps.download_headers.outputs.skip }}" = "true" ] && [ "$HAS_EXPERIMENTAL" = "true" ]; then
            echo "::notice::APT targets unavailable; proceeding with experimental channel targets"
          fi

          if [ "${{ steps.download_headers.outputs.family_policy_failed }}" = "true" ]; then
            echo "::error::FAIL: family policy violation (required families missing): ${{ steps.download_headers.outputs.family_policy_reason }} selected[rpi=${{ steps.download_headers.outputs.selected_rpi_count }},ubuntu=${{ steps.download_headers.outputs.selected_ubuntu_count }}] build_targets[rpi=${{ steps.download_headers.outputs.build_target_rpi_count }},ubuntu=${{ steps.download_headers.outputs.build_target_ubuntu_count }}]"
            exit 1
          fi

          TARGETS="${{ steps.build.outputs.target_count }}"
          OKS="${{ steps.build.outputs.ok_count }}"
          SKIPS="${{ steps.build.outputs.skip_count }}"
          FAILS="${{ steps.build.outputs.fail_count }}"
          SKIP_KERNELS="${{ steps.build.outputs.skip_kernels }}"
          EXP_TARGETS="${{ steps.build.outputs.exp_target_count }}"
          EXP_OKS="${{ steps.build.outputs.exp_ok_count }}"
          EXP_SKIPS="${{ steps.build.outputs.exp_skip_count }}"
          EXP_FAILS="${{ steps.build.outputs.exp_fail_count }}"
          EXP_SKIP_KERNELS="${{ steps.build.outputs.exp_skip_kernels }}"
          [ -z "$TARGETS" ] && TARGETS=0
          [ -z "$OKS" ] && OKS=0
          [ -z "$SKIPS" ] && SKIPS=0
          [ -z "$FAILS" ] && FAILS=0
          [ -z "$EXP_TARGETS" ] && EXP_TARGETS=0
          [ -z "$EXP_OKS" ] && EXP_OKS=0
          [ -z "$EXP_SKIPS" ] && EXP_SKIPS=0
          [ -z "$EXP_FAILS" ] && EXP_FAILS=0

          if [ -n "$SKIP_KERNELS" ]; then
            echo "::warning::Skipped kernels: $SKIP_KERNELS"
          fi

          echo "::notice::Stable summary: targets=$((OKS+SKIPS+FAILS)) ok=$OKS skip=$SKIPS fail=$FAILS"
          echo "::notice::Experimental summary: channels='${{ inputs.experimental_channels }}' targets=$EXP_TARGETS ok=$EXP_OKS skip=$EXP_SKIPS fail=$EXP_FAILS blocking=$EXP_BLOCKING"

          if [ "$FAILS" -gt 0 ]; then
            echo "::error::FAIL: stable targets failed (targets=$((OKS+SKIPS+FAILS)) ok=$OKS skip=$SKIPS fail=$FAILS)"
          elif [ "$EXP_FAILS" -gt 0 ] && [ "$EXP_BLOCKING" = "true" ]; then
            echo "::error::FAIL: experimental targets failed and blocking is enabled (targets=$EXP_TARGETS ok=$EXP_OKS skip=$EXP_SKIPS fail=$EXP_FAILS)"
          elif [ "$EXP_FAILS" -gt 0 ]; then
            echo "::warning::WARN: experimental targets failed but are non-blocking (targets=$EXP_TARGETS ok=$EXP_OKS skip=$EXP_SKIPS fail=$EXP_FAILS)"
          elif [ "$OKS" -gt 0 ]; then
            echo "::notice::OK: targets=$TARGETS stable_ok=$OKS stable_skip=$SKIPS stable_fail=$FAILS exp_ok=$EXP_OKS exp_skip=$EXP_SKIPS exp_fail=$EXP_FAILS artifacts=.ko+.dtbo"
          else
            echo "::warning::WARN: targets=$TARGETS stable_ok=$OKS stable_skip=$SKIPS stable_fail=$FAILS exp_ok=$EXP_OKS exp_skip=$EXP_SKIPS exp_fail=$EXP_FAILS"
          fi

      - name: Fail with context
        if: steps.build.outcome == 'failure'
        run: |
          echo "::error::One or more kernel target builds failed"
          exit 1
