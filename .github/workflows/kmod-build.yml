name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      archs:
        required: true
        type: string
      kernel_count:
        required: false
        type: number
        default: 3
      module_path:
        required: false
        type: string
        default: '.'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJson(inputs.archs) }}

    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            bc bison flex libssl-dev make \
            jq curl xz-utils

      - name: Detect latest Raspberry Pi kernels
        id: kernels
        run: |
          set -e

          ARCH="${{ matrix.arch }}"
          COUNT=${{ inputs.kernel_count }}

          BASE_URL="https://archive.raspberrypi.org/debian/pool/main/l/linux"

          curl -s "$BASE_URL/" \
            | grep -o "linux-image-[^\" ]*${ARCH}\.deb" \
            | sort -V \
            | tail -n $COUNT > kernels.txt

          echo "Detected kernels:"
          cat kernels.txt

          echo "kernels=$(jq -R . kernels.txt | jq -s -c .)" >> $GITHUB_OUTPUT

      - name: Build against kernels
        id: build
        working-directory: ${{ inputs.module_path }}
        continue-on-error: true
        run: |
          set -euo pipefail

          BASE_URL="https://archive.raspberrypi.org/debian/pool/main/l/linux"
          FAIL=0

          SUMMARY="$GITHUB_WORKSPACE/summary.txt"
          echo "| Kernel | Arch | Result | Note |" > "$SUMMARY"
          echo "|--------|------|--------|------|" >> "$SUMMARY"

          echo '${{ steps.kernels.outputs.kernels }}' | jq -r '.[]' | while read IMAGE_DEB; do

            HEADERS_DEB=$(echo "$IMAGE_DEB" | sed 's/linux-image-/linux-headers-/')

            echo "========================================"
            echo "Processing: $IMAGE_DEB"
            echo "========================================"

            if ! curl --silent --head --fail "$BASE_URL/$IMAGE_DEB" > /dev/null; then
              echo "⚠️ Kernel image not found, skipping"
              echo "| $IMAGE_DEB | ${{ matrix.arch }} | SKIP | image missing |" >> "$SUMMARY"
              continue
            fi

            if ! curl --silent --head --fail "$BASE_URL/$HEADERS_DEB" > /dev/null; then
              echo "⚠️ Headers not found, skipping"
              echo "| $IMAGE_DEB | ${{ matrix.arch }} | SKIP | headers missing |" >> "$SUMMARY"
              continue
            fi

            rm -rf root *.deb

            curl -s -O "$BASE_URL/$IMAGE_DEB"
            curl -s -O "$BASE_URL/$HEADERS_DEB"

            mkdir root
            dpkg-deb -x "$IMAGE_DEB" root/
            dpkg-deb -x "$HEADERS_DEB" root/

            KVER=$(ls root/lib/modules)
            KDIR="$GITHUB_WORKSPACE/root/lib/modules/$KVER/build"

            echo "Kernel version: $KVER"
            echo "Build dir: $KDIR"

            if make -C "$KDIR" M="$PWD" modules; then
              echo "✅ Build OK"
              RESULT="OK"
              NOTE=""
            else
              echo "❌ Build failed"
              RESULT="FAIL"
              NOTE=""
              FAIL=1
            fi

            echo "| $KVER | ${{ matrix.arch }} | $RESULT | $NOTE |" >> "$SUMMARY"

            if [ "$RESULT" = "OK" ]; then
              OUT="$GITHUB_WORKSPACE/artifacts/${{ matrix.arch }}/$KVER"
              mkdir -p "$OUT"

              cp -v ./*.ko "$OUT/" 2>/dev/null || true
              cp -v ./*.dtbo "$OUT/" 2>/dev/null || true
            fi

          done

          echo ""
          echo "========== BUILD SUMMARY =========="
          cat "$SUMMARY"
          echo "=================================="

          exit $FAIL

      - name: Detect module name
        if: steps.build.outcome == 'success'
        working-directory: ${{ inputs.module_path }}
        run: |
          if [ ! -f MODULE_NAME ]; then
            echo "MODULE_NAME file not found!" >&2
            exit 1
          fi
          echo "MODULE_NAME=$(cat MODULE_NAME)" >> $GITHUB_ENV

      - name: Upload artifacts
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ko-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/

      - name: Fail with context
        if: steps.build.outcome == 'failure'
        run: |
          echo "❌ One or more builds failed for arch ${{ matrix.arch }}"
          exit 1
