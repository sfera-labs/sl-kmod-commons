name: "Kernel Module build test"

on:
  workflow_call:
    inputs:
      kernel_version:
        required: true
        type: string
      module_path:
        required: false
        type: string
        default: '.'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout module repo
        uses: actions/checkout@v4

      - name: Install cross-compiler and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf device-tree-compiler bc bison flex libssl-dev make

      - name: Install Raspberry Pi kernel headers
        run: |
          sudo apt-get install -y linux-headers-${{ inputs.kernel_version }} || {
            echo "Kernel headers for ${{ inputs.kernel_version }} not found in default repos.";
            exit 1;
          }
          export KDIR=/lib/modules/${{ inputs.kernel_version }}/build
          echo "KDIR=$KDIR" >> $GITHUB_ENV

      - name: Build kernel module
        working-directory: ${{ inputs.module_path }}
        env:
          ARCH: arm
          CROSS_COMPILE: arm-linux-gnueabihf-
          KDIR: ${{ env.KDIR }}
        run: |
          make clean
          make

      - name: Detect module name
        id: detect_mod
        run: |
          modname=$(cat ${{ inputs.module_path }}/MODULE_NAME)
          echo "MODULE_NAME=$modname" >> $GITHUB_ENV

      - name: Upload .ko and .dtbo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MODULE_NAME }}-artifacts
          path: |
            ${{ inputs.module_path }}/${{ env.MODULE_NAME }}.ko
            ${{ inputs.module_path }}/${{ env.MODULE_NAME }}.dtbo
        if: always()
